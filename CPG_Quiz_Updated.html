<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPG Universal Quiz App</title>
    <style>
        :root {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
            --text-primary: #f8fafc; --text-secondary: #cbd5e1;
            --accent: #3b82f6; --accent-hover: #2563eb;
            --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
            --border-radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background-color: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); }
        h1, h2, h3 { text-align: center; margin-bottom: 16px; }
        .screen { display: none; animation: fadeIn 0.3s ease-in-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600; }
        select, button, input { width: 100%; padding: 14px; border-radius: var(--border-radius); border: 1px solid var(--bg-tertiary); background-color: var(--bg-tertiary); color: var(--text-primary); font-size: 16px; cursor: pointer; transition: all 0.2s; min-height: 52px; }
        input[type="number"] { cursor: text; }
        select:focus, input:focus { outline: none; border-color: var(--accent); }
        button { background-color: var(--accent); border: none; font-weight: 700; margin-top: 10px; }
        button:hover:not(:disabled) { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--bg-tertiary); color: var(--text-secondary); cursor: not-allowed; opacity: 0.6; }
        .stats-bar { display: flex; justify-content: space-between; background-color: var(--bg-tertiary); padding: 12px; border-radius: var(--border-radius); margin-bottom: 20px; font-size: 14px; font-weight: 600; }
        .progress-container { width: 100%; height: 8px; background-color: var(--bg-tertiary); border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--accent); transition: width 0.3s ease; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { text-align: left; background-color: var(--bg-tertiary); border: 2px solid transparent; padding: 16px; border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s; font-size: 16px; min-height: 56px; }
        .option-btn:hover:not(:disabled) { background-color: #475569; }
        .option-btn.correct { background-color: rgba(34, 197, 94, 0.2); border-color: var(--success); color: var(--success); }
        .option-btn.wrong { background-color: rgba(239, 68, 68, 0.2); border-color: var(--error); color: var(--error); }
        .option-btn.selected { border-color: var(--accent); background-color: rgba(59, 130, 246, 0.1); }
        .explanation { margin-top: 20px; padding: 16px; background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--accent); border-radius: 4px; font-size: 15px; line-height: 1.5; display: none; }
        .explanation.visible { display: block; animation: fadeIn 0.3s ease-in-out; }
        .action-buttons { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .action-buttons button { flex: 1; min-width: 80px; }
        .btn-secondary { background-color: var(--bg-tertiary); }
        .btn-secondary:hover:not(:disabled) { background-color: #475569; }
        .flashcard-container { perspective: 1000px; min-height: 300px; margin-bottom: 20px; }
        .flashcard { width: 100%; min-height: 300px; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face { position: absolute; width: 100%; min-height: 300px; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; background-color: var(--bg-tertiary); border-radius: var(--border-radius); text-align: center; border: 2px solid var(--bg-tertiary); }
        .flashcard-back { transform: rotateY(180deg); background-color: rgba(59, 130, 246, 0.1); border-color: var(--accent); }
        .flashcard-hint { margin-top: 12px; font-size: 14px; color: var(--text-secondary); }
        .results-score { font-size: 48px; font-weight: 800; text-align: center; margin: 20px 0; }
        .results-score.green { color: var(--success); }
        .results-score.amber { color: var(--warning); }
        .results-score.red { color: var(--error); }
        .results-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-box { background-color: var(--bg-tertiary); padding: 16px; border-radius: var(--border-radius); text-align: center; }
        .stat-value { font-size: 24px; font-weight: 700; display: block; }
        .stat-label { font-size: 14px; color: var(--text-secondary); }
        .review-section { max-height: 400px; overflow-y: auto; margin-bottom: 24px; padding-right: 8px; }
        .review-item { background-color: var(--bg-tertiary); padding: 16px; border-radius: var(--border-radius); margin-bottom: 12px; border-left: 4px solid var(--bg-tertiary); }
        .review-item.correct { border-left-color: var(--success); }
        .review-item.wrong { border-left-color: var(--error); }
        .review-item.skipped { border-left-color: var(--warning); }
        .review-q { font-weight: 600; margin-bottom: 8px; font-size: 15px; }
        .review-detail { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
        .review-detail strong { color: var(--text-primary); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup-screen" class="screen active">
            <h1>CPG Quiz Master</h1>
            <div class="form-group">
                <label for="mode-select">Quiz Mode</label>
                <select id="mode-select">
                    <option value="">Select a mode...</option>
                    <option value="random">Random Mix</option>
                    <option value="sequential">Sequential</option>
                    <option value="missed">Missed Only</option>
                    <option value="flashcard">Flashcard Revision</option>
                </select>
            </div>
            <div class="form-group">
                <label for="count-select">Number of Questions</label>
                <select id="count-select">
                    <option value="">Select count...</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="all">All Available</option>
                </select>
            </div>
            <div class="form-group">
                <label for="test-mode-select">Test Mode</label>
                <select id="test-mode-select">
                    <option value="practice">Practice Mode</option>
                    <option value="exam">Exam Mode</option>
                </select>
            </div>
            <div id="exam-time-group" class="form-group" style="display: none;">
                <label for="exam-time-input">Time Limit (minutes)</label>
                <input type="number" id="exam-time-input" min="1" max="300" value="60">
            </div>
            <div class="stats-bar">
                <span>Total Available: <span id="total-avail">0</span></span>
                <span>Missed Questions: <span id="total-missed">0</span></span>
            </div>
            <button id="start-btn" disabled>Start Quiz</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div id="exam-timer" style="text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 12px; display: none;">
                Time Remaining: <span id="timer-display">60:00</span>
            </div>
            <div class="stats-bar" id="quiz-stats-bar">
                <span>Correct: <span id="live-correct">0</span></span>
                <span>Wrong: <span id="live-wrong">0</span></span>
                <span>Score: <span id="live-score">0%</span></span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress-bar" style="width: 0%"></div></div>
            <div style="text-align: right; font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                Question <span id="current-q-num">1</span> of <span id="total-q-num">10</span>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options-list" id="options-list"></div>
            <div class="explanation" id="explanation"></div>
            <div class="action-buttons" id="practice-actions">
                <button class="btn-secondary" id="skip-btn">Skip</button>
                <button class="btn-secondary" id="end-session-btn">End Session</button>
                <button id="next-btn" style="display: none;">Next</button>
            </div>
            <div class="action-buttons" id="exam-actions" style="display: none;">
                <button class="btn-secondary" id="prev-exam-btn">Previous</button>
                <button class="btn-secondary" id="submit-exam-btn">Submit Exam</button>
                <button id="next-exam-btn">Next</button>
            </div>
        </div>

        <div id="flashcard-screen" class="screen">
            <div class="progress-container"><div class="progress-bar" id="fc-progress-bar" style="width: 0%"></div></div>
            <div style="text-align: right; font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                Card <span id="fc-current-num">1</span> of <span id="fc-total-num">10</span>
            </div>
            <div class="flashcard-container" onclick="flipCard()">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front">
                        <div id="fc-question" style="font-size: 18px; font-weight: 600;"></div>
                        <div class="flashcard-hint">Tap to reveal answer</div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div id="fc-answer" style="font-size: 18px; font-weight: 700; color: var(--success); margin-bottom: 12px;"></div>
                        <div id="fc-explanation" style="font-size: 15px; line-height: 1.5;"></div>
                    </div>
                </div>
            </div>
            <div class="action-buttons" id="fc-actions" style="display: none;">
                <button class="btn-secondary" style="border-color: var(--error); color: var(--error);" onclick="handleFlashcardDecision(false)">Still Learning</button>
                <button style="border-color: var(--success); color: var(--success); background-color: rgba(34, 197, 94, 0.1);" onclick="handleFlashcardDecision(true)">Got It</button>
            </div>
            <div class="action-buttons">
                <button class="btn-secondary" id="fc-skip-btn" onclick="skipFlashcard()">Skip</button>
                <button class="btn-secondary" id="fc-end-btn" onclick="endSession()">End Session</button>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <h2>Session Complete!</h2>
            <div class="results-score" id="results-score">0%</div>
            <div class="results-stats" id="results-stats-grid">
                <div class="stat-box"><span class="stat-value" id="res-correct" style="color: var(--success);">0</span><span class="stat-label">Correct</span></div>
                <div class="stat-box"><span class="stat-value" id="res-wrong" style="color: var(--error);">0</span><span class="stat-label">Wrong</span></div>
                <div class="stat-box"><span class="stat-value" id="res-skipped" style="color: var(--warning);">0</span><span class="stat-label">Skipped</span></div>
                <div class="stat-box"><span class="stat-value" id="res-total">0</span><span class="stat-label">Total</span></div>
                <div class="stat-box" id="time-stat-box" style="display: none;"><span class="stat-value" id="res-time">0:00</span><span class="stat-label">Time Taken</span></div>
            </div>
            <h3>Review All Answers</h3>
            <div class="review-section" id="review-section"></div>
            <div class="action-buttons">
                <button class="btn-secondary" id="retry-missed-btn">Retry Missed</button>
                <button id="new-session-btn">New Session</button>
            </div>
        </div>
    </div>

    <script>
        const QB = [
{id:'Q1', q:'Why is it critical for Relationship Management officers to maintain direct contact with customers through periodic visits after extending credit?', opts:['A. To immediately withdraw the facility if market conditions change', 'B. To ensure the customer receives regular marketing materials from the bank', 'C. It provides relevant, up-to-date and reliable information for ongoing management of exposure quality and overall business condition of the obligor and relationship with the bank', 'D. It is a mandatory requirement for the bank to charge higher interest rates'], ans:'C', exp:'It provides relevant, up-to-date and reliable information for ongoing management of exposure quality and overall business condition of the obligor and relationship with the bank. (Pg 146)'},
{id:'Q2', q:'Where is a credit call meeting most suitable to take place?', opts:['A. Only at the bank premises', 'B. Only at the customer\'s business location', 'C. At a neutral third-party location', 'D. Customer\'s business location as well as bank premises'], ans:'D', exp:'Customer\'s business location as well as bank premises. (Pg 146)'},
{id:'Q3', q:'What determines the frequency of credit calls?', opts:['A. Risky obligor/large exposures only', 'B. Less risky obligor/smaller exposure only', 'C. The personal preference of the Relationship Manager', 'D. Both A & B: Risky obligor/large exposures AND less risky obligor/smaller exposure. The riskier or larger the exposure, the more frequent the calls.'], ans:'D', exp:'Both A & B: Risky obligor/large exposures AND less risky obligor/smaller exposure. The riskier or larger the exposure, the more frequent the calls. (Pg 146)'},
{id:'Q4', q:'Information gathered from credit calls are properly documented and circulated via:', opts:['A. Verbal report to the Branch Manager', 'B. Call memo to business head and CRM', 'C. Email to the customer', 'D. Monthly newsletter to all staff'], ans:'B', exp:'Call memo to business head and CRM. (Pg 146)'},
{id:'Q5', q:'Why is Bank and trade check an important component of the credit process?', opts:['A. It guarantees the profitability of the loan', 'B. It eliminates all credit risk', 'C. It serves as an assessment of the obligor and confirms that the business remains a going concern', 'D. It is required by the Central Bank for all loans'], ans:'C', exp:'It serves as an assessment of the obligor and confirms that the business remains a going concern. (Pg 147)'},
{id:'Q6', q:'The ongoing administration of the quality and performance of loans depends on:', opts:['A. Periodic analysis of up-to-date financial information only', 'B. The character, ability and willingness of the customer to meet obligations only', 'C. All of the above: periodic analysis of up-to-date financial information AND the character, ability and willingness of the customer to meet obligations', 'D. The collateral value alone'], ans:'C', exp:'All of the above: periodic analysis of up-to-date financial information AND the character, ability and willingness of the customer to meet obligations. (Pg 147)'},
{id:'Q7', q:'What is the objective of collateral inspection?', opts:['A. To increase the collateral value', 'B. To prepare for immediate sale of the collateral', 'C. To confirm the existence and adequacy of all collateral held as security', 'D. To renegotiate the loan terms'], ans:'C', exp:'To confirm the existence and adequacy of all collateral held as security. (Pg 79)'},
{id:'Q8', q:'Under the CRG, RM must conduct and document a site visit prior to disbursement of funds under:', opts:['A. Overdraft facilities', 'B. Short-term trade finance', 'C. All facilities regardless of type', 'D. Term loans'], ans:'D', exp:'Term loans. (Pg 79)'},
{id:'Q9', q:'Why must collateral be revalued periodically?', opts:['A. To increase the bank\'s asset base artificially', 'B. To satisfy the customer\'s request for higher limits', 'C. To confirm the continuing appropriateness and adequacy of the forced sale value of collateral on the open market to cover the bank\'s exposure', 'D. To reduce the loan loss provisioning requirements'], ans:'C', exp:'To confirm the continuing appropriateness and adequacy of the forced sale value of collateral on the open market to cover the bank\'s exposure. (Pg 79)'},
{id:'Q10', q:'Where obligations are secured by marketable securities prone to price fluctuation (e.g. shares), what should you do?', opts:['A. Ignore the price fluctuation as it is a long-term investment', 'B. Immediately sell the securities upon any price drop', 'C. Establish a predetermined \'stop loss\' or \'sell point\' under clear advice to the obligor', 'D. Require the customer to provide additional cash collateral daily'], ans:'C', exp:'Establish a predetermined \'stop loss\' or \'sell point\' under clear advice to the obligor. (Pg 79)'},
{id:'Q11', q:'Collateral valuation is usually conducted by:', opts:['A. The Relationship Manager only', 'B. RM, CRM and Professional appraisers', 'C. The customer\'s chosen valuer only', 'D. The Central Bank of Nigeria'], ans:'B', exp:'RM, CRM and Professional appraisers. (Pg 79)'},
{id:'Q12', q:'All legal documentation in respect of approved credit exposure are kept in:', opts:['A. The Relationship Manager\'s desk', 'B. The customer\'s office', 'C. The branch manager\'s safe', 'D. Bank vault or a location of equivalent security and safety'], ans:'D', exp:'Bank vault or a location of equivalent security and safety. (Pg 147)'},
{id:'Q13', q:'What is the frequency of physical verification of all credit documentation?', opts:['A. Monthly', 'B. Quarterly', 'C. Semi-annually', 'D. Annually'], ans:'D', exp:'Annually. (Pg 147)'},
{id:'Q14', q:'How often does CRM and relevant approval authority review all outstanding credit transactions and commitments?', opts:['A. Monthly', 'B. Quarterly', 'C. Semi-annually', 'D. Annually'], ans:'D', exp:'Annually. (Pg 147)'},
{id:'Q15', q:'Under what circumstances will collateral be released to a customer?', opts:['A. Upon customer\'s written request regardless of facility status', 'B. Upon liquidation of facility in accordance with agreed terms and conditions', 'C. After 50% of the facility has been repaid', 'D. When the customer provides alternative collateral'], ans:'B', exp:'Upon liquidation of facility in accordance with agreed terms and conditions. (Full repayment AND accordance with agreed terms — not merely upon customer request.)'},
{id:'Q16', q:'How often must obligor and facility exposure quality and performance grades be reviewed?', opts:['A. Monthly', 'B. Quarterly', 'C. Semi-annually', 'D. Annually'], ans:'B', exp:'Quarterly.'},
{id:'Q17', q:'What is the primary information source for decision-making on credits and customer relationships?', opts:['A. Credit files', 'B. Customer\'s verbal assurances', 'C. External credit rating agencies only', 'D. News articles about the customer'], ans:'A', exp:'Credit files. (Pg 148)'},
{id:'Q18', q:'Credit files must contain at a minimum:', opts:['A. Only the initial loan application', 'B. Only the approved facility letter', 'C. Only the customer\'s financial statements', 'D. Memoranda and correspondence with customer'], ans:'D', exp:'Memoranda and correspondence with customer. (Pg 148)'},
{id:'Q19', q:'How often must credit files be reviewed?', opts:['A. Only at facility maturity', 'B. Periodically', 'C. Annually only', 'D. Never, once closed'], ans:'B', exp:'Periodically. (Pg 148)'},
{id:'Q20', q:'How do you treat information of an unfavourable nature in the credit file?', opts:['A. Hide it from future reviewers', 'B. Remove it and file it away separately', 'C. Permanently retain and mark the information. Do NOT hide, remove, or file away separately', 'D. Shred it immediately'], ans:'C', exp:'Permanently retain and mark the information. Do NOT hide, remove, or file away separately. (Pg 148)'},
{id:'Q21', q:'How many components are there to each customer credit file?', opts:['A. 1 component', 'B. 3 components', 'C. 4 components', 'D. 2 components'], ans:'D', exp:'2 components. (Pg 149)'},
{id:'Q22', q:'How often is the Unauthorized Overdraft Report generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'A', exp:'Daily. (Pg 114)'},
{id:'Q23', q:'How often is the Excess Over Approved Limit report generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'A', exp:'Daily. (Pg 114)'},
{id:'Q24', q:'How often are Expiring Facilities reports generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'A', exp:'Daily. (Pg 114)'},
{id:'Q25', q:'How often are Expired Facilities reports generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'B', exp:'Weekly. (Pg 114)'},
{id:'Q26', q:'How often is the Central Liability Report generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'C', exp:'Monthly. (Pg 114)'},
{id:'Q27', q:'How often is the Maturing Obligations Report generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Quarterly'], ans:'C', exp:'Monthly. (Pg 114)'},
{id:'Q28', q:'How often is the Review of Security Documentation report generated?', opts:['A. Daily', 'B. Weekly', 'C. Monthly', 'D. Annually'], ans:'D', exp:'Annually. (Pg 114)'},
{id:'Q29', q:'How often is the Portfolio Review Report generated?', opts:['A. Quarterly', 'B. Monthly', 'C. Weekly', 'D. Annually'], ans:'A', exp:'Quarterly. (Pg 114)'},
{id:'Q30', q:'How often is the Collateral Review report generated?', opts:['A. Quarterly', 'B. Monthly', 'C. Weekly', 'D. Annually (or as specified in the credit approval)'], ans:'D', exp:'Annually (or as specified in the credit approval). (Pg 114)'},
{id:'Q31', q:'How often is the Recovery Status Report generated?', opts:['A. Quarterly', 'B. Weekly', 'C. Monthly', 'D. Annually'], ans:'C', exp:'Monthly. (Pg 114)'},
{id:'Q32', q:'How often is the Recoveries Made Report generated?', opts:['A. Quarterly', 'B. Weekly', 'C. Monthly', 'D. Annually'], ans:'C', exp:'Monthly. (Pg 114)'},
{id:'Q33', q:'How often is the Reserves and Write-offs report generated?', opts:['A. Quarterly', 'B. Monthly', 'C. Weekly', 'D. Annually'], ans:'D', exp:'Annually. (Pg 114)'},
{id:'Q34', q:'How often is the Account Throughput Reporting generated?', opts:['A. Quarterly', 'B. Weekly', 'C. Monthly', 'D. Annually'], ans:'C', exp:'Monthly. (Pg 114)'},
{id:'Q35', q:'The Portfolio Review Report is sent to which recipients?', opts:['A. Business Units', 'B. Policy MCC / CRO', 'C. GCRO, GMD', 'D. BCC'], ans:'B', exp:'Policy MCC / CRO. (Pg 114)'},
{id:'Q36', q:'The Collateral Review report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'B', exp:'MCC. (Pg 114)'},
{id:'Q37', q:'The Recovery Status Report is sent to which recipients?', opts:['A. Business Units', 'B. GCRO, GMD', 'C. Policy MCC / CRO', 'D. BCC'], ans:'B', exp:'GCRO, GMD. (Pg 114)'},
{id:'Q38', q:'The Recoveries Made report is sent to which recipients?', opts:['A. BCC', 'B. Business Units / CRM', 'C. Policy MCC / CRO', 'D. GCRO, GMD'], ans:'B', exp:'Business Units / CRM. (Pg 114)'},
{id:'Q39', q:'The Account Throughput Reporting is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q40', q:'The Reserves and Write-offs report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'D', exp:'BCC. (Pg 114)'},
{id:'Q41', q:'The Review of Security Documentation report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q42', q:'The Excess Over Approval Limits report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q43', q:'The Unauthorized O/D Report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q44', q:'The Central Liability Report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q45', q:'The Maturing Obligation Report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q46', q:'The Expiring and Expired Facilities report is sent to which recipients?', opts:['A. Business Units', 'B. MCC', 'C. GCRO, GMD', 'D. BCC'], ans:'A', exp:'Business Units. (Pg 114)'},
{id:'Q47', q:'On what basis does the bank extend credit facilities?', opts:['A. On the basis of verbal commitments to the customer', 'B. On the basis of the customer\'s verbal agreement', 'C. On the basis of informal email notifications', 'D. On the basis of legal commitments notified in writing to a customer once the terms and conditions contained therein have been satisfied'], ans:'D', exp:'On the basis of legal commitments notified in writing to a customer once the terms and conditions contained therein have been satisfied. (Verbal commitments are NEVER sufficient.)'},
{id:'Q48', q:'Under what circumstances will an unadvised facility be appropriate?', opts:['A. To keep accounts within collateral cover', 'B. To avoid penalty interest', 'C. When the customer requests it verbally', 'D. When the Relationship Manager deems it necessary for daily operations', 'E. None of the above. An unadvised facility is NOT used to keep accounts within collateral cover or avoid penalty interest. It is a discretionary accommodation managed by the account officer.'], ans:'E', exp:'None of the above. An unadvised facility is NOT used to keep accounts within collateral cover or avoid penalty interest. It is a discretionary accommodation managed by the account officer. (Pg 136)'},
{id:'Q49', q:'Which one of the following will NOT be suitably structured as a term loan?', opts:['A. Equipment financing', 'B. Asset replacement', 'C. Operating expenses', 'D. New technology capital loans'], ans:'C', exp:'Operating expenses. Term loans finance capital items, not recurring operating costs. (Pg 42)'},
{id:'Q50', q:'On repayment, a customer may re-borrow under a revolving credit provided that:', opts:['A. The customer has a new business plan', 'B. The bank has increased its lending limits', 'C. There is no material change to his financial position', 'D. The customer provides additional collateral'], ans:'C', exp:'There is no material change to his financial position. (Pg 42)'},
{id:'Q51', q:'If a temporary overdraft accommodation remains outstanding for longer than 30 days, what prudent step should be taken?', opts:['A. Increase the overdraft limit', 'B. Charge a higher interest rate', 'C. Convert it to a term loan automatically', 'D. Facility shall be classified as a past due loan'], ans:'D', exp:'Facility shall be classified as a past due loan. (Pg 38)'},
{id:'Q52', q:'Customers\' requests for withdrawal against uncleared effects or drafts will NOT be approved for:', opts:['A. Drawings under DAUE/DAUD against company\'s own cheques only', 'B. Drawings in excess of the approved DAUE/DAUD only', 'C. Any withdrawal against uncleared effects', 'D. A and B exclusively: drawings under DAUE/DAUD against company\'s own cheques, AND drawings in excess of the approved DAUE/DAUD'], ans:'D', exp:'A and B exclusively: drawings under DAUE/DAUD against company\'s own cheques, AND drawings in excess of the approved DAUE/DAUD. (Pg 43)'},
{id:'Q53', q:'How many parties are there to a typical transaction involving the issuance of a bond by the bank?', opts:['A. 2 parties', 'B. 3 parties', 'C. 4 parties', 'D. 5 parties'], ans:'B', exp:'3 parties. (The bank/guarantor, the applicant/principal, and the beneficiary.)'},
{id:'Q54', q:'In what instance will a bond/guarantee be issued on a clean basis?', opts:['A. When the customer has a high credit rating', 'B. When the bank wants to increase its fee income', 'C. When the underlying contract is short-term', 'D. Bond includes a clause to make it effective only upon receipt of equivalent cash cover from the beneficiary'], ans:'D', exp:'Bond includes a clause to make it effective only upon receipt of equivalent cash cover from the beneficiary. (Pg 43)'},
{id:'Q55', q:'Which statement is TRUE concerning the maturity of the underlying contract vs. the bond/guarantee tenor?', opts:['A. The maturity of the underlying contract must be shorter than the tenor of the bond/guarantee', 'B. The maturity of the underlying contract must be equal to the tenor of the bond/guarantee', 'C. The maturity of the underlying contract must EXCEED the tenor of the bond/guarantee', 'D. The maturity of the underlying contract has no relation to the tenor of the bond/guarantee'], ans:'C', exp:'The maturity of the underlying contract must EXCEED the tenor of the bond/guarantee. (Pg 44)'},
{id:'Q56', q:'Which statement is FALSE regarding the issuance of bonds/guarantees?', opts:['A. Issuance of guarantees should be carefully evaluated', 'B. Issuance of guarantees to support offshore facilities is strongly encouraged in view of its profitability', 'C. The bank must assess the risk before issuing guarantees', 'D. Guarantees should have specific expiration dates'], ans:'B', exp:'\'Issuance of guarantees to support offshore facilities is strongly encouraged in view of its profitability.\' This is FALSE — the CPG strongly DISCOURAGES such guarantees. (Pg 44)'},
{id:'Q57', q:'What kind of risk is the bank exposed to on ALL commercial papers it intermediates?', opts:['A. Reputation risk', 'B. Credit risk', 'C. Market risk', 'D. Liquidity risk'], ans:'A', exp:'Reputation risk. (This applies even when the bank does not guarantee the CP.) (Pg 44)'},
{id:'Q58', q:'When the Bank does not guarantee the CPs it issues, what role does the bank play?', opts:['A. Principal role', 'B. Agency role', 'C. Guarantor role', 'D. Underwriter role'], ans:'B', exp:'Agency role. (Pg 44)'},
{id:'Q59', q:'In a lease facility, what is the most important consideration?', opts:['A. The aesthetic value of the asset', 'B. Ability of the bank to take effective and prompt possession of the asset in the event of default by the lessee', 'C. The brand name of the asset supplier', 'D. The length of the lease agreement only'], ans:'B', exp:'Ability of the bank to take effective and prompt possession of the asset in the event of default by the lessee. (Pg 44)'},
{id:'Q60', q:'How many parties are there in a lease arrangement?', opts:['A. 2 parties', 'B. 3 parties', 'C. 4 parties', 'D. 5 parties'], ans:'B', exp:'3 parties. (Bank/lessor, client/lessee, and asset supplier/vendor.)'},
{id:'Q61', q:'What is the most important consideration for the bank when undertaking warehouse financing?', opts:['A. The location of the warehouse', 'B. The insurance coverage of the goods', 'C. The credit rating of the borrower', 'D. Assumption of physical control of goods financed'], ans:'D', exp:'Assumption of physical control of goods financed. (Pg 45)'},
{id:'Q62', q:'Warehouse financing should NOT be considered where:', opts:['A. The goods are fast-moving consumer goods', 'B. The maximum tenor is 12 months', 'C. The forced sale value of goods is NOT adequate to cover the exposure at all times', 'D. The bank takes physical control of the goods'], ans:'C', exp:'The forced sale value of goods is NOT adequate to cover the exposure at all times. (The FSV must ALWAYS be adequate — option D \'none of the above\' is WRONG because C is a valid reason to decline.) (Pg 45)'},
{id:'Q63', q:'Under what condition will Access Bank take a lead role in loan syndication?', opts:['A. When the loan amount is very small', 'B. When the borrower is a new customer', 'C. Where it has the expertise and capacity to manage the syndication fully', 'D. When other banks refuse to participate'], ans:'C', exp:'Where it has the expertise and capacity to manage the syndication fully. (Pg 46)'},
{id:'Q64', q:'Unsecured credit to bank\'s directors must be:', opts:['A. Approved by the Branch Manager', 'B. Approved by the GMD only', 'C. Approved by the MCC only', 'D. Approved by Board prior to drawdown AND mentioned at a board meeting for ratification'], ans:'D', exp:'Approved by Board prior to drawdown AND mentioned at a board meeting for ratification. (Pg 46)'},
{id:'Q65', q:'What is the maximum tenure the Bank can allow for agricultural loans?', opts:['A. 3 years', 'B. 5 years', 'C. 7 years', 'D. 8 years'], ans:'D', exp:'8 years. (Pg 46)'},
{id:'Q66', q:'Which consideration is NOT important in establishing the bank\'s lending rate?', opts:['A. Cost of funds', 'B. Lending rates of peer banks', 'C. Lending rates of POOR banks', 'D. Risk/return preference'], ans:'C', exp:'Lending rates of POOR banks. (Peer banks yes; poor banks no.) (Pg ~47)'},
{id:'Q67', q:'What is the minimum requirement for all items pledged as security for credit facilities?', opts:['A. Verbal agreement from the customer', 'B. Perfected legal mortgage in favour of Access Bank', 'C. Insurance coverage only', 'D. Personal guarantee of the director'], ans:'B', exp:'Perfected legal mortgage in favour of Access Bank. (Pg 50)'},
{id:'Q68', q:'What is the minimum collateral requirement for all credit extensions to corporate obligors?', opts:['A. Board resolution only', 'B. Personal guarantees of directors only', 'C. All-assets debenture only', 'D. Any of the above. (Board resolution, personal guarantees of directors, OR all-assets debenture — any satisfies the minimum.)'], ans:'D', exp:'Any of the above. (Board resolution, personal guarantees of directors, OR all-assets debenture — any satisfies the minimum.) (Pg 50)'},
{id:'Q69', q:'Which one is NOT accepted collateral based on the CPG?', opts:['A. Landed property', 'B. Cash collateral', 'C. Marketable securities', 'D. Life assurance policy', 'E. Letter of hypothecation of stock'], ans:'E', exp:'Letter of hypothecation of stock. (Pg 50)'},
{id:'Q70', q:'What is the minimum percentage of Expected Forced Sale Value (EFSV) of collateral acceptable to Access Bank?', opts:['A. 100%', 'B. 110%', 'C. 120%', 'D. 130%'], ans:'C', exp:'120%. (Pg 50)'},
{id:'Q71', q:'Which landed property may be acceptable under the CPG?', opts:['A. Undeveloped land in a remote area', 'B. Property with less than 15 years remaining on lease', 'C. Property with disputed ownership', 'D. Undeveloped land in prime location (e.g. Abuja, V/I or Lekki)'], ans:'D', exp:'Undeveloped land in prime location (e.g. Abuja, V/I or Lekki). (Pg 51)'},
{id:'Q72', q:'EFSV must be determined by a professional estate valuer for facilities in excess of:', opts:['A. N10 million', 'B. N20 million', 'C. N30 million', 'D. N50 million'], ans:'D', exp:'N50 million. (Pg 50)'},
{id:'Q73', q:'In what type of account will cash deposited as collateral be placed?', opts:['A. Savings account', 'B. Current account', 'C. Escrow account', 'D. Fixed deposit account'], ans:'C', exp:'Escrow account. (Pg 51)'},
{id:'Q74', q:'In what instance will Access Bank allow another bank to share/participate in its lien over cash collateral?', opts:['A. When the customer requests it in writing', 'B. When the other bank is a partner bank', 'C. Where the account balance can conveniently accommodate such lien by the second bank', 'D. Never, under any circumstances'], ans:'C', exp:'Where the account balance can conveniently accommodate such lien by the second bank. (Pg 51)'},
{id:'Q75', q:'Acceptability of stocks & shares as collateral shall be limited to:', opts:['A. All companies listed on any exchange', 'B. Unlisted private companies', 'C. Selected blue chip companies quoted on the NSE', 'D. Start-up companies with high growth potential'], ans:'C', exp:'Selected blue chip companies quoted on the NSE. (Pg 51)'},
{id:'Q76', q:'The assessed market value of shares used as collateral is based on the average value over what period?', opts:['A. 30 days', 'B. 90 days', 'C. 180 days', 'D. 360 days (12 months)'], ans:'D', exp:'360 days (12 months). (Pg 52)'},
{id:'Q77', q:'What resource material is most appropriate to find the average value of a share?', opts:['A. Financial newspapers', 'B. Online stock trackers', 'C. Bank approved stockbroker', 'D. The customer\'s financial advisor'], ans:'C', exp:'Bank approved stockbroker.'},
{id:'Q78', q:'What is the recommended minimum shrinkage/discount on market value of share collateral?', opts:['A. Between 10% and 20%', 'B. Between 20% and 30%', 'C. Between 30% and 50%', 'D. Between 50% and 70%'], ans:'C', exp:'Between 30% and 50%. (Pg 52)'},
{id:'Q79', q:'Under what circumstance will personal, joint and several guarantees of Directors be acceptable as SOLE security?', opts:['A. When the director has a high net worth', 'B. When the director has a long track record with the bank', 'C. When the loan amount is small', 'D. When the company is highly profitable', 'E. None of the above. Personal guarantees alone are NEVER sufficient as sole security regardless of the director\'s net worth or track record.'], ans:'E', exp:'None of the above. Personal guarantees alone are NEVER sufficient as sole security regardless of the director\'s net worth or track record. (CPG)'},
{id:'Q80', q:'Corporate guarantees may NOT be acceptable under which instance?', opts:['A. Cross-corporate guarantee of a SUBSIDIARY company for a credit line approved for the PARENT company', 'B. Guarantee of a parent company for a subsidiary', 'C. Guarantee of a sister company with strong financials', 'D. Guarantee of an affiliate with shared management'], ans:'A', exp:'Cross-corporate guarantee of a SUBSIDIARY company for a credit line approved for the PARENT company. (A subsidiary guaranteeing the parent is not acceptable.) (Pg ~52)'},
{id:'Q81', q:'The most compelling consideration for accepting a life assurance policy as collateral:', opts:['A. The premium payment history of the policy', 'B. The surrender value of such policy is very easily ascertainable and adequate to ensure full recovery of the facility', 'C. The policy is issued by a reputable insurance company', 'D. The policyholder is a close relative of the bank director'], ans:'B', exp:'The surrender value of such policy is very easily ascertainable and adequate to ensure full recovery of the facility. (Pg 52)'},
{id:'Q82', q:'Which item is EXEMPTED from the insurance requirement for pledged assets?', opts:['A. Landed property', 'B. Guarantees', 'C. Motor vehicles', 'D. Machinery and equipment'], ans:'B', exp:'Guarantees. (Legal undertakings, not physical assets.) (Pg 55)'},
{id:'Q83', q:'Time frame for completion of preliminary screening of credit requests:', opts:['A. 24 hours', 'B. 48 hours', 'C. 72 hours', 'D. 7 days'], ans:'A', exp:'24 hours. (Pg 131)'},
{id:'Q84', q:'What is the purpose of preliminary credit screening?', opts:['A. To finalize the loan documentation', 'B. To disburse funds immediately', 'C. To facilitate the early identification of unacceptable risk exposures', 'D. To calculate the final interest rate'], ans:'C', exp:'To facilitate the early identification of unacceptable risk exposures. (Pg 131)'},
{id:'Q85', q:'All recommendations for denial of credit facility shall require endorsement of:', opts:['A. Relationship Manager', 'B. Group Head', 'C. Credit Risk Management', 'D. Branch Manager'], ans:'B', exp:'Group Head. (Pg 131)'},
{id:'Q86', q:'What is the primary outcome of the credit analysis process?', opts:['A. Immediate disbursement of funds', 'B. Creation of a marketing plan for the client', 'C. Determination of credit risk rating only', 'D. Determination of credit risk rating AND an approval/rejection recommendation of facility'], ans:'D', exp:'Determination of credit risk rating AND an approval/rejection recommendation of facility. (Both outcomes together.)'},
{id:'Q87', q:'Which component must be included in a full credit review?', opts:['A. Financial spreads only', 'B. Risk rating document only', 'C. Facility approval memo only', 'D. All of the above: financial spreads, risk rating document, facility approval memo, Target Market/Risk Acceptance criteria'], ans:'D', exp:'All of the above: financial spreads, risk rating document, facility approval memo, Target Market/Risk Acceptance criteria. (Pg 132)'},
{id:'Q88', q:'Which is an important consideration for renewal of approved facilities?', opts:['A. Continued viability only', 'B. Account turnover only', 'C. Status of collateral only', 'D. All of the above: continued viability, account turnover, status of collateral, micro & economic considerations'], ans:'D', exp:'All of the above: continued viability, account turnover, status of collateral, micro & economic considerations. (Pg 133)'},
{id:'Q89', q:'Why does the CPG direct that risk ratings be assigned to each facility?', opts:['A. To provide a uniform basis for comparison only', 'B. To indicate credit risk inherent in the facility only', 'C. All of the above: to provide a uniform basis for comparison AND to indicate credit risk inherent in the facility and overall acceptability', 'D. To satisfy external auditor requirements'], ans:'C', exp:'All of the above: to provide a uniform basis for comparison AND to indicate credit risk inherent in the facility and overall acceptability. (Pg 133)'},
{id:'Q90', q:'How long does the credit analyst have to complete detailed analysis?', opts:['A. 24 hours', 'B. 48 hours', 'C. 48–72 hours from receipt of complete information', 'D. 7 days'], ans:'C', exp:'48–72 hours from receipt of complete information. (Pg 133)'},
{id:'Q91', q:'How long does a customer have to accept a credit offer?', opts:['A. Within 30 days of facility offer date', 'B. Within 60 days of facility offer date', 'C. Within 90 days of facility offer date', 'D. Within 7 days of facility offer date'], ans:'A', exp:'Within 30 days of facility offer date. (Pg 133)'},
{id:'Q92', q:'How long does a customer have to meet all conditions precedent to drawdown?', opts:['A. Within 30 days of facility offer date', 'B. Within 60 days of facility offer date', 'C. Within 90 days of facility offer date', 'D. Within 180 days of facility offer date'], ans:'C', exp:'Within 90 days of facility offer date. (Pg 133)'},
{id:'Q93', q:'What mode of acceptance of facility offer is required?', opts:['A. Verbal acceptance', 'B. SMS acceptance', 'C. In writing. Verbal or SMS acceptance is NOT sufficient', 'D. Email acceptance only'], ans:'C', exp:'In writing. Verbal or SMS acceptance is NOT sufficient. (Pg 133)'},
{id:'Q94', q:'If a single bank customer has multiple exposures with more than one market-facing unit, how many credit files should be maintained?', opts:['A. One for each market-facing unit', 'B. One single credit file', 'C. Two credit files (one for retail, one for corporate)', 'D. No credit file is needed'], ans:'B', exp:'One single credit file. (Pg 134)'},
{id:'Q95', q:'Who is responsible for establishing the customer\'s credit file?', opts:['A. Relationship Manager', 'B. Branch Manager', 'C. Credit Administration', 'D. The customer'], ans:'C', exp:'Credit Administration. (Pg 134)'},
{id:'Q96', q:'Whose responsibility is it to ensure complete and legally enforceable documentation of credit?', opts:['A. Credit Administration only', 'B. Legal Department only', 'C. Relationship Manager in conjunction with customers', 'D. Branch Manager'], ans:'C', exp:'Relationship Manager in conjunction with customers. (Pg 134)'},
{id:'Q97', q:'What time frame does the CPG stipulate for the completion of credit documentation?', opts:['A. 24 hours', 'B. 7 days', 'C. 30 days', 'D. None (the CPG does not specify a fixed deadline for credit documentation completion)'], ans:'D', exp:'None (the CPG does not specify a fixed deadline for credit documentation completion).'},
{id:'Q98', q:'What is the minimum number of years remaining on a property lease for it to be acceptable as collateral?', opts:['A. 5 years', 'B. More than 15 years', 'C. 10 years', 'D. 20 years'], ans:'B', exp:'More than 15 years. (Pg 51)'},
{id:'Q99', q:'Deferral of any security document for facility under N1bn will require approval of:', opts:['A. The GMD', 'B. The MCC', 'C. The Head of Credit Risk Management', 'D. The GDMD'], ans:'D', exp:'The GDMD. (Pg 134)'},
{id:'Q100', q:'How often must CAD prepare a report on deferrals?', opts:['A. Weekly', 'B. Monthly', 'C. Quarterly', 'D. Annually'], ans:'B', exp:'Monthly. (Pg 134)'},
{id:'Q101', q:'What may trigger the need for an Exposure Quality Review?', opts:['A. Routine annual review', 'B. Identification of a decline in the quality of the facility', 'C. Customer request for a limit increase', 'D. Change in Relationship Manager'], ans:'B', exp:'Identification of a decline in the quality of the facility. (Pg 137)'},
{id:'Q102', q:'How often must the MCC institute periodic reviews of exposure?', opts:['A. Monthly', 'B. Quarterly', 'C. Semi-annually', 'D. Annually'], ans:'B', exp:'Quarterly. (Pg 134)'},
{id:'Q103', q:'The overall responsibility of sustaining the quality of individual risk exposure is primarily that of:', opts:['A. Credit Risk Management', 'B. Credit Administration', 'C. Relationship Manager', 'D. The Board of Directors'], ans:'C', exp:'Relationship Manager. (Pg 134)'},
{id:'Q104', q:'Discovery of any declining risk exposure must be brought to the notice of the Chairman of CAC within:', opts:['A. 24 hours', 'B. 3 days', 'C. 5 days', 'D. 7 days'], ans:'D', exp:'7 days. (Pg 138)'},
{id:'Q105', q:'Whose responsibility is it to make this report to the Chairman of CAC?', opts:['A. Relationship Manager only', 'B. Credit Risk Management only', 'C. Branch Manager', 'D. ED of business unit AND Head, Credit Risk Management. Both are jointly responsible'], ans:'D', exp:'ED of business unit AND Head, Credit Risk Management. Both are jointly responsible. (Pg 138)'},
{id:'Q106', q:'Where collateral is a mortgage on landed property, which is a condition precedent to final approval?', opts:['A. Verbal agreement from the customer', 'B. Payment of the first installment', 'C. Receipt of certificate of good title from search', 'D. Insurance coverage only'], ans:'C', exp:'Receipt of certificate of good title from search. (Pg 138)'},
{id:'Q107', q:'Whose responsibility is it to develop and implement a collateral management plan?', opts:['A. Relationship Manager', 'B. Legal Department', 'C. Credit Risk Management', 'D. Credit Administration'], ans:'C', exp:'Credit Risk Management. (Pg 139)'},
{id:'Q108', q:'In event of non-compliance with collateralization conditions, whose responsibility is it to report to the Chairman, CAC?', opts:['A. Relationship Manager', 'B. Branch Manager', 'C. Credit Risk Management', 'D. Legal Department'], ans:'C', exp:'Credit Risk Management. (Pg 139)'},
{id:'Q109', q:'What is the time frame within which this report will be made?', opts:['A. Within 24 hours', 'B. Within 3 days', 'C. Within 5 days', 'D. Within 7 days'], ans:'D', exp:'Within 7 days. (Pg 139)'},
{id:'Q110', q:'First delinquency notice: within ___ working days. Second notice: after ___ working days of first.', opts:['A. 5 working days / 10 working days', 'B. 7 working days / 14 working days', 'C. 10 working days / 20 working days', 'D. 15 working days / 30 working days'], ans:'C', exp:'10 working days / 20 working days. (Pg 139)'},
{id:'Q111', q:'How regularly must the credit watch list of non-performing/delinquent credits be prepared?', opts:['A. Weekly', 'B. Monthly', 'C. Quarterly', 'D. Annually'], ans:'B', exp:'Monthly. (Pg 139)'},
{id:'Q112', q:'Responsibility for delinquency management:', opts:['A. Relationship Manager', 'B. Credit Administration', 'C. Legal Department', 'D. Remedial Assets Unit'], ans:'D', exp:'Remedial Assets Unit. (Pg 140)'},
{id:'Q113', q:'All non-performing/delinquent credits shall be classified as remedial assets after:', opts:['A. 90 days', 'B. 180 days', 'C. 360 days', 'D. 720 days'], ans:'B', exp:'180 days. (CPG)'},
{id:'Q114', q:'Credit facilities may be restructured:', opts:['A. Only at the request of the obligor', 'B. Only by the RM on identification of need based on performance', 'C. Both A & B: at the request of the obligor OR by the RM on identification of need based on performance', 'D. Only by the Board of Directors'], ans:'C', exp:'Both A & B: at the request of the obligor OR by the RM on identification of need based on performance. (Pg 140)'},
{id:'Q115', q:'Loan loss provisioning for outstanding credit facility NOT specifically provided for:', opts:['A. 0.5%', 'B. 5%', 'C. 1%', 'D. 10%'], ans:'C', exp:'1%. (Pg 86)'},
{id:'Q116', q:'Loan loss provisioning for \'Substandard\' classification:', opts:['A. 10%', 'B. 20%', 'C. 50%', 'D. 100%'], ans:'B', exp:'20%. (Pg 85)'},
{id:'Q117', q:'Loan loss provisioning for \'Doubtful\' classification:', opts:['A. 10%', 'B. 20%', 'C. 50%', 'D. 100%'], ans:'C', exp:'50%. (Pg 85)'},
{id:'Q118', q:'Loan loss provisioning for \'Lost\' classification:', opts:['A. 100%', 'B. 50%', 'C. 20%', 'D. 10%'], ans:'A', exp:'100%. (Pg 85)'},
{id:'Q119', q:'Interest waivers and/or credit charge consideration is limited only to credit exposures classified as:', opts:['A. \'Substandard\'', 'B. \'Doubtful\'', 'C. \'Lost\'', 'D. \'Pass\''], ans:'C', exp:'\'Lost\'. (Pg 141)'},
{id:'Q120', q:'Discussions and negotiation in respect of repayment/waiver is the responsibility of:', opts:['A. Relationship Manager', 'B. Legal Department', 'C. Remedial Asset Unit', 'D. Credit Administration'], ans:'C', exp:'Remedial Asset Unit. (Pg 141)'},
{id:'Q121', q:'Under what circumstance may the bank grant a new facility to a borrower who had previously enjoyed a waiver?', opts:['A. When the customer provides additional collateral', 'B. When the customer has a new business plan', 'C. Where the customer has fully settled the previously granted waivers', 'D. When the Board of Directors approves it unconditionally'], ans:'C', exp:'Where the customer has fully settled the previously granted waivers. (Pg 141)'},
{id:'Q122', q:'All waivers of interest and charges shall require approval of:', opts:['A. The Board of Directors', 'B. The MCC', 'C. GMD', 'D. Relationship Manager'], ans:'C', exp:'GMD. (Pg 141)'},
{id:'Q123', q:'Under what condition(s) will an exposure be recommended for write-off?', opts:['A. Impossible contact with the obligor', 'B. Cost of recovery exceeds the debt', 'C. Collateral shortfall', 'D. Any of the above: impossible contact, cost exceeds debt, collateral shortfall, or no further recovery possible'], ans:'D', exp:'Any of the above. (Impossible contact, cost exceeds debt, collateral shortfall, or no further recovery possible.) (Pg 140)'},
{id:'Q124', q:'All credit facility write-offs require approval by:', opts:['A. The GMD', 'B. The Board of Directors (and CBN)', 'C. The MCC', 'D. The Head of Credit Risk Management'], ans:'B', exp:'The Board of Directors (and CBN). (Pg 140)'},
{id:'Q125', q:'Erroneous interest or charges reversal may be approved by:', opts:['A. The MCC', 'B. The Head of Credit Risk Management', 'C. The Branch Manager', 'D. GMD'], ans:'D', exp:'GMD. (Pg 140/141)'},
{id:'Q126', q:'The primary reference document for creating & managing credit exposure:', opts:['A. The ERM Framework', 'B. The Market Risk Policy', 'C. The Central Bank Guidelines', 'D. None of the above (CPG Manual itself)'], ans:'D', exp:'None of the above (CPG Manual itself — not the ERM Framework, not market risk policy). (CPG)'},
{id:'Q126b', q:'Under the CPG, which statement is True?', opts:['A. The CPG is only for senior management', 'B. Only the Head Office must comply', 'C. All of the above: The CPG is intended for credit personnel AND all business units/countries must fully comply', 'D. The CPG is optional for regional offices'], ans:'C', exp:'All of the above: The CPG is intended for credit personnel AND all business units/countries must fully comply.'},
{id:'Q127', q:'The Africa regional office of the Credit Risk Group reports to:', opts:['A. The Board of Directors', 'B. The GMD directly', 'C. The local country manager', 'D. Head, Credit Risk Management in Head Office'], ans:'D', exp:'Head, Credit Risk Management in Head Office. (CPG)'},
{id:'Q128', q:'Which is NOT a function of the MCC?', opts:['A. Review policy for Board approval', 'B. Approve individual credits within its limits', 'C. Approve lending decisions & limit setting', 'D. Monitor portfolio performance'], ans:'C', exp:'"Approve lending decisions & limit setting." (MCC reviews policy for Board approval; it approves individual credits within its limits but does not set limits.) (Pg 23–24)'},
{id:'Q129', q:'Whose responsibility is it to ensure the integrity of the credit process and proper documentation of credit decisions?', opts:['A. Credit Risk Management (primarily)', 'B. The Relationship Manager only', 'C. The Legal Department', 'D. The Branch Manager'], ans:'A', exp:'Credit Risk Management (primarily). (CPG)'},
{id:'Q130', q:'The policy document sets out a framework for:', opts:['A. The consistent management of Credit Risk', 'B. Marketing strategies only', 'C. Human resource management', 'D. IT security protocols'], ans:'A', exp:'The consistent management of Credit Risk. (Pg 8)'},
{id:'Q131', q:'The policy is derived from:', opts:['A. The Central Bank guidelines only', 'B. The Bank\'s Enterprise Risk Management Framework', 'C. International Financial Reporting Standards', 'D. The Board of Directors\' personal preferences'], ans:'B', exp:'The Bank\'s Enterprise Risk Management Framework. (CPG)'},
{id:'Q132', q:'The Enterprise Risk Management Framework represents the following EXCEPT:', opts:['A. Identifying opportunities', 'B. Assessing risk', 'C. Monitoring and reporting of demand deposits', 'D. Managing risks proactively'], ans:'C', exp:'Monitoring and reporting of demand deposits. (ERM is about identifying opportunities, assessing risk, and managing risks proactively — NOT deposit monitoring.) (CPG)'},
{id:'Q133', q:'The manual outlines the general policies and procedures framework and incorporates provisions for:', opts:['A. Marketing/risk analysis only', 'B. Approval/administration only', 'C. Monitoring/reporting only', 'D. All of the above: marketing/risk analysis, approval/administration, and monitoring/reporting'], ans:'D', exp:'All of the above: marketing/risk analysis, approval/administration, and monitoring/reporting. (Pg 9)'},
{id:'Q134', q:'The credit risk management policy manual is designed for the following EXCEPT:', opts:['A. "Structuralize credit policies for the bank, giving CLIENTS clear and consistent direction."', 'B. Giving EMPLOYEES clear and consistent direction', 'C. Establishing standards for credit analysis', 'D. Defining approval authorities'], ans:'A', exp:'"Structuralize credit policies for the bank, giving CLIENTS clear and consistent direction." (It gives EMPLOYEES, not clients, direction.) (Pg 9)'},
{id:'Q135', q:'Risk management policies will be:', opts:['A. Reviewed on an ongoing basis', 'B. Reviewed once every 5 years', 'C. Static and unchangeable', 'D. Reviewed only upon regulatory request'], ans:'A', exp:'Reviewed on an ongoing basis. (Pg 10)'},
{id:'Q136', q:'The policy manual is intended for:', opts:['A. Senior management only', 'B. The Legal Department only', 'C. All personnel involved in the creation and management of credit exposure', 'D. External auditors only'], ans:'C', exp:'All personnel involved in the creation and management of credit exposure. (CPG)'},
{id:'Q137', q:'Access Bank\'s risk management policies comprise the following EXCEPT:', opts:['A. Policies', 'B. Standards', 'C. Procedures', 'D. Structures'], ans:'D', exp:'Structures. (Policies, Standards, and Procedures — not Structures.) (CPG)'},
{id:'Q138', q:'Proposals for addition to or modification of policy statements will be presented to:', opts:['A. The Board of Directors', 'B. The GMD', 'C. The MCC', 'D. The Head, Credit Risk Management'], ans:'D', exp:'The Head, Credit Risk Management. (Pg 11)'},
{id:'Q139', q:'Complete: the Bank "considers risk management philosophy and culture as the set of shared beliefs, values, attitudes and ___":', opts:['A. Rules', 'B. Regulations', 'C. Practices', 'D. Penalties'], ans:'C', exp:'Practices. (Pg 13)'},
{id:'Q140', q:'The Bank\'s Risk Management philosophy is that ___ and ___ risk attitude will ensure sustainable growth:', opts:['A. Aggressive and bold', 'B. Moderate and guarded', 'C. Conservative and passive', 'D. High-risk and high-reward'], ans:'B', exp:'Moderate and guarded. (Pg 13)'},
{id:'Q141', q:'Which is NOT a guiding principle for the Bank\'s risk culture?', opts:['A. Promote a portfolio view of risk', 'B. "Create and evaluate business-unit and Bank-wide risk profile to consider what is best for their individual business units regardless of what is best for the Bank as a whole."', 'C. Encourage open communication about risk', 'D. Foster accountability for risk management'], ans:'B', exp:'"Create and evaluate business-unit and Bank-wide risk profile to consider what is best for their individual business units regardless of what is best for the Bank as a whole." This violates the portfolio view principle. (Pg 13)'},
{id:'Q142', q:'The enterprise risk management framework is:', opts:['A. Mandatory', 'B. Optional', 'C. Recommended but not enforced', 'D. Applicable only to the Head Office'], ans:'A', exp:'Mandatory. (Pg 14)'},
{id:'Q143', q:'Risk management is the responsibility of:', opts:['A. MCC only', 'B. Risk Officers only', 'C. Relationship Managers only', 'D. All of the above: MCC, Risk Officers, and Relationship Managers'], ans:'D', exp:'All of the above: MCC, Risk Officers, and Relationship Managers. (Pg 14)'},
{id:'Q144', q:'___ attention shall be paid to quantifiable and non-quantifiable risks:', opts:['A. Primary', 'B. Equal', 'C. Secondary', 'D. Minimal'], ans:'B', exp:'Equal. (Pg 14)'},
{id:'Q145', q:'Before granting credit to an individual or sole proprietorship you must do all the following EXCEPT:', opts:['A. Have a personal relationship with the client', 'B. Obtain a complete financial picture', 'C. Conduct an independent income check', 'D. Make personal visits'], ans:'A', exp:'Have a personal relationship with the client. (A complete financial picture, independent income check, and personal visits are required; a personal relationship is NOT a CPG requirement.)'},
{id:'Q146', q:'Individuals or business credit must be secured by all the following EXCEPT:', opts:['A. Tangible collateral', 'B. Easy-to-dispose collateral', 'C. Collateral in the bank\'s possession', 'D. Relevant past history with the Bank'], ans:'D', exp:'Relevant past history with the Bank. (Tangible collateral, easy-to-dispose collateral, and collateral in the bank\'s possession are required; past history alone is not a security item.)'},
{id:'Q147', q:'Unsecured loans to individuals or organisations, other than to members of staff of the Bank, shall require:', opts:['A. Branch Manager approval', 'B. MCC approval only', 'C. Board of Directors approval', 'D. GMD/GDMD\'s approval irrespective of the amount involved (in addition to other approvals that may be required)'], ans:'D', exp:'GMD/GDMD\'s approval irrespective of the amount involved (in addition to other approvals that may be required).'},
{id:'Q148', q:'Which of the following is NOT a type of Credit Exposure?', opts:['A. Legal Commitments', 'B. Term loan', 'C. Unadvised Facility', 'D. Advised Facility'], ans:'A', exp:'Legal Commitments. (Term loan, Unadvised Facility, and Advised Facility are credit exposure types; Legal Commitments is not a standalone exposure type in this context.)'},
{id:'Q149', q:'A credit extension made known to the borrower and to which the Bank is committed (as long as the borrower fulfils prior conditions) is:', opts:['A. An unadvised facility', 'B. A temporary overdraft', 'C. A term loan', 'D. An advised facility'], ans:'D', exp:'An advised facility. (Pg 136)'},
{id:'Q150', q:'Acceptance of an advised credit by a corporate client must be supported by a:', opts:['A. Board Resolution, among other requirements', 'B. Verbal agreement', 'C. Email confirmation', 'D. Personal guarantee only'], ans:'A', exp:'Board Resolution, among other requirements. (Pg 136)'},
{id:'Q151', q:'Tenor of revolving credits must not exceed:', opts:['A. 1 year', 'B. 2 years', 'C. 3 years', 'D. 5 years'], ans:'C', exp:'3 years. (Pg 42)'},
{id:'Q152', q:'To manage the Bank\'s exposure effectively, an Account Officer may choose not to advise the full amount of the facility approved. One valid reason for this is:', opts:['A. To restrict response to emergency needs for additional lines', 'B. To avoid documentation requirements', 'C. To increase the interest rate arbitrarily', 'D. To bypass credit approval'], ans:'A', exp:'To restrict response to emergency needs for additional lines. (This is the unadvised/discretionary portion managed by the Account Officer.)'},
{id:'Q153', q:'An Overdraft (OD) is a line of credit that allows a customer to write cheques for _______ the actual balance on the account, with a finance charge on the excess.', opts:['A. Less than', 'B. Equal to', 'C. More than', 'D. Exactly half of'], ans:'C', exp:'More than.'},
{id:'Q154', q:'Ideally, the use of an OD should be restricted to:', opts:['A. Working capital requirements', 'B. Capital expenditure', 'C. Personal loans', 'D. Long-term investments'], ans:'A', exp:'Working capital requirements. (Pg 43)'},
{id:'Q155', q:'It is imperative for an account officer to satisfy himself as to which of the following before extending an overdraft?', opts:['A. The reasonableness of the OD amount only', 'B. The usage matching the client\'s business cycle only', 'C. The client\'s ability to absorb interest only', 'D. All of the above: the reasonableness of the OD amount, the usage matching the client\'s business cycle, and the client\'s ability to absorb interest'], ans:'D', exp:'All of the above: the reasonableness of the OD amount, the usage matching the client\'s business cycle, and the client\'s ability to absorb interest.'},
{id:'Q156', q:'For customers wishing to draw against confirmed drafts (DAU/D or DAUE), the facility shall be approved for:', opts:['A. The full value of the draft regardless of clearing time', 'B. The tenor the draft is in clearing', 'C. A maximum of 90 days', 'D. A maximum of 180 days'], ans:'B', exp:'The tenor the draft is in clearing. (Pg 43)'},
{id:'Q157', q:'Tenor of revolving credit (confirmation):', opts:['A. One year', 'B. Three years', 'C. Five years', 'D. Seven years'], ans:'B', exp:'Three years. (Pg 42)'},
{id:'Q159', q:'Warehouse financing is best suited where:', opts:['A. Goods are slow-moving', 'B. Maximum tenor is 24 months', 'C. Forced sale value of goods is inadequate', 'D. All of the above: fast-moving consumer goods, maximum tenor 12 months, forced sale value of goods adequate to cover exposure'], ans:'D', exp:'All of the above: fast-moving consumer goods, maximum tenor 12 months, forced sale value of goods adequate to cover exposure. (CPG)'},
{id:'Q160', q:'Maximum tenure of a TIME loan:', opts:['A. One year or less', 'B. Two years', 'C. Three years', 'D. Five years'], ans:'A', exp:'One year or less. (Pg 42)'},
{id:'Q160b', q:'Where a warehouse financing facility is granted, which is necessary?', opts:['A. Periodic stock taking only', 'B. FIFO release only', 'C. Bank takes physical control only', 'D. All of the above: periodic stock taking, FIFO release, bank takes physical control'], ans:'D', exp:'All of the above: periodic stock taking, FIFO release, bank takes physical control. (Pg 45)'},
{id:'Q161', q:'Maximum tenor of a TERM loan:', opts:['A. 7 years (maturities beyond 7 years generally discouraged)', 'B. 5 years', 'C. 10 years', 'D. 3 years'], ans:'A', exp:'7 years (maturities beyond 7 years generally discouraged). (Pg 42)'},
{id:'Q162', q:'Where a financing request is too large for one Bank, two or more Banks may jointly provide financing. The Bank shall be willing to participate in syndications led by other Banks subject to:', opts:['A. The syndicated facility being led by a foreign bank', 'B. The syndicated facility being subject to the same high standards of credit analysis, documentation, etc.', 'C. The syndicated facility having a lower interest rate', 'D. The syndicated facility being unsecured'], ans:'B', exp:'The syndicated facility being subject to the same high standards of credit analysis, documentation, etc. (Pg 45)'},
{id:'Q163', q:'Under what condition will the Bank assume lead roles in syndication.', opts:['A. Where the loan amount is very small', 'B. Where the borrower is a new customer', 'C. Where the Bank has the expertise and capacity to manage the syndication fully', 'D. When other banks refuse to participate'], ans:'C', exp:'Where the Bank has the expertise and capacity to manage the syndication fully. (Pg 46)'},
{id:'Q164', q:'Policy Loans are exceptional or unsecured credit extensions to certain parties. Which of the following is NOT a policy loan category?', opts:['A. Loans to directors', 'B. Loans to politically exposed persons', 'C. Loans to related parties', 'D. Loans to staff of the bank'], ans:'D', exp:'Loans to staff of the bank. (Staff loans are a separate category, not a "policy loan" requiring special handling.) (Pg 46)'},
{id:'Q165', q:'The appraisal of agricultural loan proposals shall take account of:', opts:['A. Vulnerability to weather/pest/disease only', 'B. Specialized skills required only', 'C. Long maturing period only', 'D. All of the above: vulnerability to weather/pest/disease, specialized skills required, and long maturing period'], ans:'D', exp:'All of the above: vulnerability to weather/pest/disease, specialized skills required, and long maturing period. (Pg 46)'},
{id:'Q166', q:'The Bank may extend credit for specific agricultural ventures provided that:', opts:['A. The venture is located in a rural area', 'B. The borrower has previous farming experience', 'C. The loan is secured by farmland', 'D. The bank receives acceptable guarantees from public or private sources external to the project'], ans:'D', exp:'The bank receives acceptable guarantees from public or private sources external to the project. (Pg 47)'},
{id:'Q167', q:'Maximum tenor for agricultural loans:', opts:['A. 3 years', 'B. 5 years', 'C. 7 years', 'D. 8 years'], ans:'D', exp:'8 years. (Pg 46)'},
{id:'Q168', q:'Advance Payment, Bid Bonds and Guarantees should contain all of the following elements EXCEPT:', opts:['A. Specific expiration date', 'B. Limited amount', 'C. Clear statement of the underlying contract', 'D. "The Bank may not charge a fee for its issuance."'], ans:'D', exp:'"The Bank may not charge a fee for its issuance." This is FALSE — the Bank CAN and does charge fees for bond/guarantee issuance. (Pg 44)'},
{id:'Q169', q:'Maximum tenor for placements with approved banks:', opts:['A. 30 days', 'B. 90 days', 'C. 180 days', 'D. 360 days'], ans:'D', exp:'360 days. (Pg 47)'},
{id:'Q170', q:'Nature of limit the CPG imposes on TAKINGS from other banks:', opts:['A. None. There is no limit on takings from other banks.', 'B. 10% of shareholders\' funds', 'C. 20% of shareholders\' funds', 'D. 50% of shareholders\' funds'], ans:'A', exp:'None. There is no limit on takings from other banks. (Pg 47)'},
{id:'Q171', q:'Access Bank policy will NOT finance armament loans or gambling loans. What exceptions exist?', opts:['A. None, no exceptions allowed', 'B. The GMD can approve with a waiver', 'C. The MCC can approve under special circumstances', 'D. The Board of Directors must approve'], ans:'D', exp:'The Board of Directors must approve. (Pg 35)'},
{id:'Q172', q:'Section 20(1a) of BOFIA 1991: a Bank shall not grant more than ___% of shareholders\' funds to a company, its subsidiaries and associates.', opts:['A. 10%', 'B. 15%', 'C. 20%', 'D. 25%'], ans:'C', exp:'20%. (Pg 70)'},
{id:'Q173', q:'The concept of one obligor includes any company belonging to a group whose management are linked by virtue of their related ownership structure.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q174', q:'It shall be the responsibility of the Relationship Manager to determine whether related company obligations shall be aggregated.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q175', q:'\'One-obligor\' includes all subsidiaries owned at least 50% (aggregate of direct and indirect shareholdings).', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q176', q:'Any less than 50% owned affiliate where the borrower exercises management control is included in the one-obligor concept.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q177', q:'Any obligor related to the borrower as a result of guarantees, endorsements, or similar arrangements in favor of the Bank is included.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q178', q:'All obligors under common ownership or control of a corporation or individual are included in the one-obligor concept.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 70)'},
{id:'Q179', q:'Approval limit — Executive Directors:', opts:['A. N75 million', 'B. N150 million', 'C. N200 million', 'D. N500 million'], ans:'A', exp:'N75 million. (Pg 64)'},
{id:'Q180', q:'Approval limit — Group Deputy Managing Director:', opts:['A. N75 million', 'B. N150 million', 'C. N200 million', 'D. N500 million'], ans:'B', exp:'N150 million. (Pg 64)'},
{id:'Q181', q:'Approval limit — Group Managing Director/CEO:', opts:['A. N75 million', 'B. N150 million', 'C. N200 million', 'D. N500 million'], ans:'C', exp:'N200 million. (Pg 64)'},
{id:'Q182', q:'Approval limit — Management Credit Committee (MCC):', opts:['A. N150 million', 'B. N200 million', 'C. N1 billion', 'D. N500 million'], ans:'D', exp:'N500 million. (Pg 64)'},
{id:'Q183', q:'Approval limit — Board Credit Committee:', opts:['A. N500 million', 'B. N1 billion', 'C. N6 billion', 'D. N10 billion'], ans:'C', exp:'N6 billion. (Pg 64)'},
{id:'Q184', q:'Approval limit — Board of Directors:', opts:['A. N500 million', 'B. N1 billion', 'C. N6 billion', 'D. Above N6 billion'], ans:'D', exp:'Above N6 billion (No upper limit, subject to CPG and statutory lending limit). (Pg 64)'},
{id:'Q185', q:'There is no limit to the amount of credit which may be approved by the Board of Directors, provided the credit conforms to the CPG and statutory lending limit.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 64)'},
{id:'Q185b', q:'Credits above N6 billion must be approved by the Board of Directors.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 65)'},
{id:'Q186', q:'The MCC shall review and approve extensions of credit that exceed N15 million but are lower than N20 million.', opts:['A. True', 'B. False'], ans:'B', exp:'False — This amount range is incorrect. MCC approves credits above the GMD\'s N200 million limit up to N500 million.'},
{id:'Q187', q:'The Management Credit Committee shall meet at least once a MONTH.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The MCC meets at least ONCE A WEEK. (Pg 23)'},
{id:'Q188', q:'For an MCC meeting to be valid, the Chairman or Vice Chairman must be present. The Chairman or Vice Chairman, the Secretary and at least 2 other members form a quorum.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The quorum requirement stated here is incorrect per the CPG. (Pg 25)'},
{id:'Q189', q:'In the absence of the GMD, the GDMD automatically assumes the lending limit of the GMD.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The GDMD does NOT automatically assume the GMD\'s limit; a formal delegation is required. (Pg 25)'},
{id:'Q190', q:'Recommendation and approval of facilities shall require involvement of a minimum of ___ credit officers:', opts:['A. 1 officer', 'B. 3 officers', 'C. 2 officers', 'D. 4 officers'], ans:'B', exp:'3 officers. (Pg 62)'},
{id:'Q191', q:'The Bank\'s pricing strategy shall be based on the following EXCEPT:', opts:['A. Cost of funds', 'B. Cost of administering the relationship', 'C. Risk/return preference', 'D. Customer\'s ability to pay'], ans:'D', exp:'Customer\'s ability to pay. (Cost of funds, cost of administering the relationship, and risk/return preference are valid bases; ability to pay alone is not a pricing input.)'},
{id:'Q192', q:'Which of the following is NOT a consideration in ascertaining the margins to be applied in estimating lending rate?', opts:['A. Desired profitability of target segment', 'B. Profitability per customer', 'C. Lending rates of peer banks', 'D. Size of the customer'], ans:'D', exp:'Size of the customer. (Desired profitability of target segment, profitability per customer, and lending rates of peer banks are all valid considerations; size alone is not.)'},
{id:'Q193', q:'What is the purpose of risk management policies?', opts:['A. To support the Bank\'s business strategies only', 'B. To ensure the achievement of the Bank\'s overall corporate goals and objectives only', 'C. All of the above: to support the Bank\'s business strategies AND to ensure the achievement of the Bank\'s overall corporate goals and objectives', 'D. To comply with external auditor requests only'], ans:'C', exp:'All of the above: to support the Bank\'s business strategies AND to ensure the achievement of the Bank\'s overall corporate goals and objectives.'},
{id:'Q195', q:'Which one of the following does NOT form a critical part of the Bank\'s risk management policy?', opts:['A. Management policies', 'B. Performance standards', 'C. Procedures', 'D. None of the above'], ans:'D', exp:'None of the above. (Management policies, performance standards, and procedures ALL form critical parts.)'},
{id:'Q196', q:'The risk management policies and procedures of the bank are articulated mainly by:', opts:['A. Relationship Management', 'B. Legal Department', 'C. Credit Risk Management', 'D. Internal Audit'], ans:'C', exp:'Credit Risk Management.'},
{id:'Q197', q:'According to the CPG, the Credit Risk Group of the bank is presently made up of how many divisions?', opts:['A. 2', 'B. 3', 'C. 4', 'D. 5'], ans:'C', exp:'4.'},
{id:'Q198', q:'Where will all issues regarding credit risk management from the bank\'s branches in countries other than Nigeria be treated?', opts:['A. Head Office only', 'B. Local country manager', 'C. Africa regional office', 'D. Central Bank of Nigeria'], ans:'C', exp:'Africa regional office. (Pg 9)'},
{id:'Q199', q:'Credit Risk Management at Head Office is responsible for setting overall policies on all issues relating to credit risk management in every country where Access Bank is represented.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 26)'},
{id:'Q200', q:'The Bank\'s representatives in other countries may institute their own independent credit risk management policies.', opts:['A. True', 'B. False'], ans:'B', exp:'False — No (they may only institute local policies for issues NOT specifically addressed in Head Office policies, and subject to endorsement). (Pg 10)'},
{id:'Q201', q:'Any local policy in any of the Bank\'s representative offices which turns out to be at variance with Head Office policies:', opts:['A. Is automatically voided', 'B. Can be implemented without Head Office approval', 'C. Must be approved at the same level as Head Office policies', 'D. Must be approved by the local branch manager only'], ans:'C', exp:'Must be approved at the same level as Head Office policies. (Pg 10)'},
{id:'Q202', q:'Under what circumstance will the country office be permitted to institute their own local credit risk policies?', opts:['A. For issues not specifically addressed in Head Office policies only', 'B. Adapted to their peculiarities only', 'C. Where Head Office delegates development of certain policies only', 'D. All of the above: for issues not specifically addressed in Head Office policies; adapted to their peculiarities; or where Head Office delegates development of certain policies'], ans:'D', exp:'All of the above: for issues not specifically addressed in Head Office policies; adapted to their peculiarities; or where Head Office delegates development of certain policies. (Pg 10)'},
{id:'Q203', q:'Such local policies of the country office would not be endorsed by Head Office Credit Risk Management, but must be approved by GDMD or GMD.', opts:['A. True', 'B. False'], ans:'B', exp:'False — Such local policies MUST be endorsed by Head Office Credit Risk Management (as well as approved). (Pg 10)'},
{id:'Q204', q:'Whose responsibility is it to ensure that the provisions of the CPG remain relevant and adequate?', opts:['A. Relationship Manager only', 'B. Credit Risk Management only', 'C. Head of Credit Risk Management only', 'D. All personnel who are involved in the credit process'], ans:'D', exp:'All personnel who are involved in the credit process. (Pg 10)'},
{id:'Q205', q:'An approval may be given by a designee other than the primary authority for such approval.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 11)'},
{id:'Q206', q:'Where authority to approve is delegated, such designation can be in writing only.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The CPG requires delegation to be IN WRITING; the statement as worded implies it can be oral, which is False. (Pg 11)'},
{id:'Q207', q:'Examples of credit products that shall qualify as term loans include the following EXCEPT:', opts:['A. Equipment financing', 'B. Raw material financing', 'C. Asset replacement', 'D. New technology capital loans'], ans:'B', exp:'Raw material financing. (Equipment financing, asset replacement, and new technology capital loans are term loan products; raw material financing is typically working capital / revolving.) (Pg 42)'},
