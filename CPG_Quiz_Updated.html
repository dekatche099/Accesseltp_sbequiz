{id:'Q209', q:'The CPG covers the marketing, analysis, processing, approval and reporting of loans.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q214', q:'As an Account Officer or Relationship Manager, you must know all aspects of the CPG.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q218', q:'The Bank may need to change these policies and procedures as laws, market conditions and the Bank\'s strategy change.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q219', q:'This guide may be altered or even withdrawn as the need arises. The change must be communicated to all concerned parties.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q220', q:'You must initiate changes to the CPG where you spot areas for improvement.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q223', q:'Most of the topics in this guide are based on a few principles.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q224', q:'Understanding these principles will give you a better understanding of credit policy.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q225', q:'They will help you with day-to-day credit decision-making, especially when you come across new situations.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q227', q:'This will not only sharpen your skills but also enhance your career.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q228', q:'Individuals and companies place their funds with us trusting our integrity in managing these funds.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q229', q:'This integrity must flow through everything the Bank does.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q230', q:'Any break in the chain of integrity, no matter how small and no matter where, will eventually lead to the decline of the Bank — if it is not checked.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q231', q:'The Bank will not take any action that may compromise its integrity.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q232', q:'It is easy to forget the importance of integrity. In credit functions you are far removed from the depositors who have entrusted their money to you.', opts:['A. True', 'B. False'], ans:'B', exp:'False — You must NEVER forget the importance of integrity regardless of how removed you feel.'},
{id:'Q233', q:'As the funds you lend come from so many sources you often feel no specific responsibility.', opts:['A. True', 'B. False'], ans:'B', exp:'False — You must always feel responsibility regardless of the number of funding sources.'},
{id:'Q234', q:'As a Banker you must make a conscious effort to continuously strengthen your integrity.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q235', q:'The name Access Bank is a constant reminder of this need.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q239', q:'For every transaction you must learn to identify and minimize all the potential risks in that transaction.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q240', q:'For every risk the Bank takes we must have a matching return for taking that risk.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q241', q:'All too often we take the interest and fees we charge as fixed and simply apply our efforts to structuring a credit.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q242', q:'In many instances the return on the credit is far too low for the risk of lending. A 10% profit margin on a loan is a small compensation for losing the whole loan.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q243', q:'It would take the profit of 10 loans just to break even. In this situation our success rate must be over 90% of all loans.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q244', q:'In special cases we might decide to have an exposure to a company at a low return with the expectation of getting other business/accounts, which will improve the profitability of the name.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q245', q:'From experience a bad loan takes more than ten times as much management effort as a good loan.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q251', q:'A guiding principle of credit is that all information should be independently verified.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q252', q:'Independent verification may involve an outside expert or a member of staff.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q253', q:'Independently verified information helps to reduce risk considerably.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q254', q:'An important aspect of independent verification is separation controls — the person who prepares a credit should not be the one who approves it.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q255', q:'The principle of separation controls is a very wide principle that occurs in several diverse forms.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q256', q:'The principle is not simply that certain items should be matched, but that we need to understand corresponding items.', opts:['A. True','B. False'], ans:'B', exp:'False. The correct principle is to understand what should be matched and what should be deliberately mismatched — not just "understand corresponding items."'},
{id:'Q257', q:'We need to know what should be matched with what and in some cases what should be deliberately mismatched.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q258', q:'A key principle of credit policy is that the Bank will always comply with all Government regulations.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q259', q:'The Bank operates under a license.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q260', q:'By not complying with regulations we not only breach our contract with the authorities, we also risk losing our license or incurring penalties.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q261', q:'If we assume that Government regulations are in the best interest of the country, then we work against this interest when we break them.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q262', q:'If we break regulations and this information reaches the market, our reputation will be diminished.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q263', q:'The fall in reputation could result in lost business and reduced profit. Considering all the negative results of breaking regulations, we are much better off complying with them.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q264', q:'A loan is a contract between two (or more) parties where one party agrees to give the other party funds based on agreed terms.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q265', q:'These terms should include when and how the funds will be given as well as when and how the funds will be paid.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q267', q:'The net income from loans is the bulk of the Bank\'s total earnings.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q268', q:'Loans represent the Bank\'s single largest exposure to jeopardy.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q271', q:'A well-managed, high-quality loan portfolio will give the Bank a competitive advantage in the Banking industry.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q272', q:'An OD fluctuates regularly and even moves into credit periodically as the business cycle is completed.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q273', q:'Though theoretically repayable on demand, an OD may in practice run from year to year without being called in.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q274', q:'The company\'s ability to complete its asset conversion cycle, its profitability, relationships and exposures to other Banks are key considerations in fixing an initial overdraft limit. The extent of utilization and turnover recorded are principal issues at renewal.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 43)'},
{id:'Q279', q:'Requests for longer tenors for temps not supported by confirmed drafts shall be documented properly in a FAM and FSR.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q280', q:'All temps shall be approved by officers who have authority to do so, while clean accommodations should require one-up approval.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q282', q:'Good clients with substantial turnover and strong management can be offered direct credit (instant credit) for cheques lodged into their accounts for clearing.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q283', q:'Financial Institutions are often given direct credit if they carry a risk rating of 2 or 3.', opts:['A. True','B. False'], ans:'B', exp:'False. Financial Institutions are given direct credit if they carry a risk rating of 1 or 2 (not 2 or 3).'},
{id:'Q284', q:'Banker\'s Acceptance (BA) can be sold to a third party usually at a discount. By accepting the bill, the accepting institution guarantees payment.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q285', q:'BA is usually revolving and available for periods up to 9 months.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q286', q:'The BA line is available on standby to fund any type of transaction.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q287', q:'Rollover of BAs is dependent on prompt liquidation of the earlier drawdown. It is often DISCOURAGED that a standby OD line be put in place for the customer.', opts:['A. True','B. False'], ans:'B', exp:'False. It is often ENCOURAGED (not discouraged) that a standby OD line be put in place for the customer.'},
{id:'Q288', q:'We cannot sell Bankers\' Acceptances when we need more liquidity, so we have to be extremely careful with BAs.', opts:['A. True','B. False'], ans:'B', exp:'False. BAs CAN be sold to third parties at a discount; this is one of their key features.'},
{id:'Q289', q:'For a Revolving Credit, the customer may re-borrow sums as needed up to the limit of the facility. It is usually given to finance a company\'s permanent working capital and is ever-green for the period of the total facility.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 42)'},
{id:'Q292', q:'Access Bank can buy or fund the purchase of a capital asset at a client\'s request and hire or lease it to them at an agreed rental.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 44)'},
{id:'Q294', q:'Access Bank will finance leases for a wide range of equipment in normal use such as textile machinery, computers, industrial machines, telecommunications equipment, aircraft, ships and boats, motor vehicles, etc.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 44)'},
{id:'Q296', q:'The credit management cycle in Access Bank has 5 distinct phases.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q297', q:'The type of customer selected for banking services depends on whether the company falls within the Bank\'s target market and our risk acceptance criteria.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 119)'},
{id:'Q298', q:'Credit Analysis and Packaging does NOT include collecting information, analyzing the industry and client, judgment on ability to repay, structuring appropriate facilities, and obtaining necessary approvals.', opts:['A. True','B. False'], ans:'B', exp:'False. Credit Analysis and Packaging DOES include all of these activities.'},
{id:'Q299', q:'Developing the association with our clients and monitoring their business is UNNECESSARY.', opts:['A. True','B. False'], ans:'B', exp:'False. It is NECESSARY, not only to ensure repayment but also to explore new business opportunities.'},
{id:'Q300', q:'Credit Administration and Control are the step-by-step procedures a credit follows from initial contact to final repayment, necessary to keep quality consistently high.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q301', q:'Establishment of a target market and a client focus form the basis of strategically strong business and credit relationships.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q303', q:'The target markets are the industries a particular credit team concentrates its marketing efforts on.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q305', q:'Lending to customers within the client focus will be dependent on their meeting our Risk Acceptance Criteria.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q307', q:'A good Account Officer is not one that aims at winning and retaining any client at all costs, but the one that learns to say \'no\' to low quality credit proposals and those that do not fit into corporate strategy.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q308', q:'You must know clearly your target market at both the industry level and the client level.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q309', q:'You must clearly see how your marketing goals fit into the Bank\'s strategy.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q310', q:'You must ensure portfolio risks are minimised by avoiding excessive loan concentration in any industry, region or product.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q312', q:'The Bank will play across the entire chain of its customers\' business.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 13)'},
{id:'Q313', q:'The guide is designed to be a holistic framework for creating and managing risk assets.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 13)'},
{id:'Q314', q:'There may be clients of the Bank who will have several units responsible for approving all credit extensions related to the client.', opts:['A. True','B. False'], ans:'A', exp:'True.'},
{id:'Q315', q:'The authority to extend or approve credit is granted to individual credit officers based upon their grades, portfolio, and length of stay in the organization.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 61)'},
{id:'Q316', q:'Credit approval officers are recommended by senior members of risk and business management for approval by shareholders at the general meeting.', opts:['A. True','B. False'], ans:'B', exp:'False. Credit approval officers are NOT approved by shareholders at general meetings; they are designated internally. (Pg 61)'},
{id:'Q317', q:'The level of authority required to approve credit will INCREASE as amounts and transaction risks increase and as risk rating worsens.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 61)'},
{id:'Q318', q:'The risk asset portfolio of the bank shall be deliberately managed to ensure CONCENTRATION of risk to choice industries, market sectors and individual customers.', opts:['A. True','B. False'], ans:'B', exp:'False. The portfolio is managed to ensure DIVERSIFICATION (avoid concentration), not concentration. (CPG)'},
{id:'Q319', q:'Credit risk is described as the potential that a bank borrower or counter party will fail to meet obligations in accordance with agreed terms.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 14)'},
{id:'Q320', q:'Direct lending risk is that actual customer obligation and contingent obligations will not be repaid on time.', opts:['A. True','B. False'], ans:'B', exp:'False. Direct lending risk applies only to ACTUAL (not contingent) obligations. Contingent obligations are a separate risk. (Pg 15)'},
{id:'Q321', q:'Direct lending risk exists only at the commencement of the credit extension.', opts:['A. True','B. False'], ans:'B', exp:'False — Direct lending risk exists for the ENTIRE LIFE of the transaction. (Pg 15)'},
{id:'Q322', q:'Contingent lending risk is the risk that potential customer obligation will become actual obligation and will not be repaid on time.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 15)'},
{id:'Q324', q:'Pre-settlement risk is the risk of default on a contractual obligation before settlement of the contract by a counter party.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 15)'},
{id:'Q325', q:'Clearing risk may occur when funds are transferred on a customer\'s instructions before the bank receives reimbursement.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 15)'},
{id:'Q326', q:'Equity risk occurs when the bank invests in, holds or receives equity, equity-like securities or other junior securities in non-affiliated entities.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 15)'},
{id:'Q327', q:'Price risk is the risk that market conditions may change for an individual instrument or for all securities of the same general class.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 16)'},
{id:'Q328', q:'Liquidity risk is the risk that the bank may be UNABLE to meet its financial commitments to customers or markets when due.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 16)'},
{id:'Q329', q:'Fiduciary risk occurs when the bank is charged with responsibilities of acting as a trustee for third parties.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 16)'},
{id:'Q330', q:'Disclosure risk is the risk that there is disclosure of information that the bank knows or should have known to be incorrect.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 16)'},
{id:'Q331', q:'Country risk is the risk that an event in a country will impair the value of the Bank\'s assets or adversely affect the ability of obligations within that country to honour their obligations.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 16)'},
{id:'Q332', q:'The Bank\'s credit risk management framework is made up of ___ distinct modules:', opts:['A. 3 modules', 'B. 4 modules', 'C. 5 modules: Risk Portfolio Planning, Exposure Development and Creation, Exposure Management, Delinquency Management/Loan Workout, and Credit Recovery', 'D. 6 modules'], ans:'C', exp:'5 modules: Risk Portfolio Planning, Exposure Development and Creation, Exposure Management, Delinquency Management/Loan Workout, and Credit Recovery. (Pg 17)'},
{id:'Q333', q:'Risk portfolio plans shall be developed at the overall bank level ONLY.', opts:['A. True','B. False'], ans:'B', exp:'False — Plans are developed at both the overall bank level AND the individual business unit level. (Pg 17)'},
{id:'Q334', q:'In the unlikely event of decline in quality of assets, prompt identification and management of such delinquency may reduce credit loss to the bank.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 18)'},
{id:'Q335', q:'In the absence of approved credit programs, transactions for individual customers or customer relationships will be treated as individual/business credits.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 19)'},
{id:'Q336', q:'As a result of their peculiar nature, all exposures to a customer or group approved as individual/business credits must be aggregated and managed by Credit Risk Management.', opts:['A. True','B. False'], ans:'B', exp:'False — The aggregation and management responsibility lies with the Relationship Manager and approval officer, not solely CRM. (Pg 19)'},
{id:'Q337', q:'The Board Credit Committee is comprised of 6 non-executive directors, the GMD, the GDMD, and a few executive directors.', opts:['A. True','B. False'], ans:'B', exp:'False — The composition as stated is incorrect. (Pg 23)'},
{id:'Q338', q:'The Board Credit Committee shall meet not more than once quarterly.', opts:['A. True','B. False'], ans:'B', exp:'False — The BCC meets more frequently than quarterly. (Pg 23)'},
{id:'Q339', q:'For an MCC meeting to be valid, it must be presided over by the GMD or GDMD ONLY.', opts:['A. True','B. False'], ans:'B', exp:'False — The CPG allows delegation to another member to serve as Chairman. (Pg 25)'},
{id:'Q340', q:'Approvals can be obtained by circulation of credit memo for absent MCC members.', opts:['A. True','B. False'], ans:'B', exp:'False — All members must attend MCC meetings; approval by circulation is not permitted. (Pg 25)'},
{id:'Q341', q:'The Criticized Assets Committee shall be convened normally every MONTH.', opts:['A. True','B. False'], ans:'B', exp:'False — The CAC meets QUARTERLY (once every quarter). (Pg 25)'},
{id:'Q342', q:'Facilities shall be regarded as delinquent where normal repayment of principal and/or interest is in arrears for less than 360 days.', opts:['A. True','B. False'], ans:'A', exp:'True — Delinquency classification (not yet "remedial") covers the period up to 360 days; remedial classification kicks in after 180 days. (Pg 25)'},
{id:'Q343', q:'The decision to transfer non-performing facilities to remedial assets management must be taken at MCC meeting under the GMD\'s chairmanship.', opts:['A. True','B. False'], ans:'B', exp:'False — This decision is taken at the CAC, not the MCC. (Pg 29)'},
{id:'Q344', q:'Credit approval is always required for the establishment of a credit facility.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 61)'},
{id:'Q345', q:'Risk rating limits is the ONLY mechanism to control the Bank\'s portfolio of credit exposures.', opts:['A. True','B. False'], ans:'B', exp:'False — Risk Rating Limits are the PRIMARY mechanism, but not the only one. (Pg 74)'},
{id:'Q346', q:'Risk rating limits are established by the Head of Credit Risk Management and approved by the Criticized Assets Committee.', opts:['A. True','B. False'], ans:'B', exp:'False — They are approved by the MANAGEMENT CREDIT COMMITTEE, not the CAC. (Pg 74)'},
{id:'Q347', q:'Risk rating limits, no matter how appropriate, are subject to legal lending limits.', opts:['A. True','B. False'], ans:'A', exp:'True — Legal lending limits ALWAYS prevail over internal risk rating limits. (Pg 74)'},
{id:'Q348', q:'Risk rating limits shall be established for the following EXCEPT:', opts:['A. Banks', 'B. Corporations', 'C. Government-owned entities', 'D. Individuals'], ans:'D', exp:'Individuals. Risk rating limits apply to Banks, Corporations, and Government-owned entities — not individuals. (Pg 74)'},
{id:'Q349', q:'For purposes of applying Risk Rating Limits, which is TRUE?', opts:['A. Parent company rating for corporations only', 'B. Lead bank rating for syndicated loans only', 'C. Determined rating for other entities only', 'D. All of the above: parent company rating for corporations, lead bank rating for syndicated loans, and determined rating for other entities.'], ans:'D', exp:'All of the above: parent company rating for corporations, lead bank rating for syndicated loans, and determined rating for other entities. (Pg 75)'},
{id:'Q350', q:'Exposure against Risk Rating Limits is measured as the Outstanding and Unused Commitments (OSUC) to a given relationship.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 75)'},
{id:'Q351', q:'OSUC may be considered GROSS of reductions resulting from sales of assets and risk mitigation efforts.', opts:['A. True','B. False'], ans:'B', exp:'False — OSUC is considered NET of such reductions. (Pg 75)'},
{id:'Q354', q:'All Risk Rating Limit exceptions will be reported QUARTERLY to the MCC.', opts:['A. True','B. False'], ans:'B', exp:'False — They are reported MONTHLY to the MCC. (Pg 76)'},
{id:'Q355', q:'On an annual basis, the Head of Credit Risk Management will review all Risk Rating Limit exceptions.', opts:['A. True','B. False'], ans:'B', exp:'False — This review is done QUARTERLY, not annually. (Pg 76)'},
{id:'Q356', q:'A proposal or marketing letter does NOT require credit approval as long as it does not obligate the bank in any way.', opts:['A. True','B. False'], ans:'A', exp:'True — A proposal that expressly disclaims commitment does not need credit approval. (Pg 76)'},
{id:'Q359', q:'The level of authority required for approval is a function of the facility amount.', opts:['A. True','B. False'], ans:'A', exp:'True. (Pg 62)'},
{id:'Q362', q:'Sign-off by at least one officer from Credit Risk Management with exposure endorsement authority is NOT always a condition for approval.', opts:['A. True','B. False'], ans:'B', exp:'False — CRM sign-off IS always required for credit approval to be valid. (Pg 62)'},
{id:'Q368', q:'Which statement is NOT correct regarding credit facility reviews?', opts:['A. Extensions beyond 30 days (up to 60 days) need GDMD approval', 'B. Extensions beyond 60 days need GMD/CEO approval', 'C. MCC is not the approver for these extensions', 'D. Extension beyond 60 days must be approved by MCC'], ans:'D', exp:'"Extension beyond 60 days must be approved by MCC." The correct rule: extensions beyond 30 days (up to 60 days) need GDMD; extensions beyond 60 days need GMD/CEO. MCC is not the approver. (Pg 68)'},
{id:'Q370', q:'When an established credit facility undergoes a material change, who determines materiality?', opts:['A. Relationship Manager', 'B. Head, Credit Risk Management', 'C. Group Managing Director', 'D. Management Credit Committee'], ans:'B', exp:'Head, Credit Risk Management. (Pg 66)'},
{id:'Q375', q:'Each underwriting and distribution must have a Defined Distribution Period that cannot exceed ___ days:', opts:['A. 30 days', 'B. 60 days', 'C. 90 days', 'D. 180 days'], ans:'C', exp:'90 days. (Pg 135)'},
{id:'Q418', q:'Exposure management entails ongoing prompt and timely identification of decline in quality/performance of a credit exposure.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 137)'},
{id:'Q421', q:'It is the responsibility of the Relationship Manager to monitor the performance of credit facilities.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 136)'},
{id:'Q422', q:'Whose responsibility is it to review credit facility performance?', opts:['A. Credit Risk Management', 'B. Relationship Manager', 'C. Legal Department', 'D. Remedial Assets Unit'], ans:'B', exp:'Relationship Manager. (Pg 137)'},
{id:'Q423', q:'Whose duty is it to confirm the status and adequacy of collateral and legal documentation?', opts:['A. Relationship Manager', 'B. Credit Administration', 'C. Credit Risk Manager', 'D. Remedial Assets Unit'], ans:'C', exp:'Credit Risk Manager. (Pg 137)'},
{id:'Q424', q:'Whose duty is it to evaluate the impact of industry and market factors on the customer and the customer\'s financial position?', opts:['A. Credit Risk Management', 'B. Credit Administration', 'C. Relationship Manager', 'D. Remedial Assets Unit'], ans:'C', exp:'Relationship Manager. (Pg 137)'},
{id:'Q425', q:'Exposure management entails restructuring exposures as may be required.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 136)'},
{id:'Q426', q:'How often must the MCC institute a review of exposures?', opts:['A. Monthly', 'B. Quarterly', 'C. Semi-annually', 'D. Annually'], ans:'B', exp:'Quarterly. (Pg 137)'},
{id:'Q427', q:'The overall responsibility of sustaining the quality of credit risk exposures is certainly that of Credit Risk Management.', opts:['A. True', 'B. False'], ans:'B', exp:'False — It is the RELATIONSHIP MANAGER\'s responsibility. (Pg 137)'},
{id:'Q428', q:'____________ will be responsible for overall credit quality review of all outstanding risk exposures.', opts:['A. Credit Risk Management', 'B. Relationship Manager', 'C. Remedial Assets Unit', 'D. Board of Directors'], ans:'B', exp:'Relationship Manager. (Pg 137)'},
{id:'Q429', q:'Relationship Management will periodically report all temporary overdrafts and excesses over approved limits for appropriate action.', opts:['A. True', 'B. False'], ans:'B', exp:'False — This is the responsibility of CRM (Credit Risk Management), not Relationship Management. (Pg 137)'},
{id:'Q430', q:'Decline in quality of risk exposure is to be brought to the attention of the GMD and GDMD immediately.', opts:['A. True', 'B. False'], ans:'B', exp:'False — It is reported to the ED and Head, Credit Risk Management. (Pg 138)'},
{id:'Q431', q:'Management of credit collateral is the SOLE responsibility of Relationship Management.', opts:['A. True', 'B. False'], ans:'B', exp:'False — It is a shared responsibility involving CRM, ED, and Legal. (Pg 138)'},
{id:'Q432', q:'The cost of conducting searches is borne by the obligor whether or not prior consent was obtained to incur such expenditure.', opts:['A. True', 'B. False'], ans:'B', exp:'False — Prior consent of the obligor must be obtained before incurring search expenses. (Pg 138)'},
{id:'Q433', q:'Where the collateral for a credit facility is a mortgage on landed property, which is a condition precedent to final approval?', opts:['A. Verbal agreement', 'B. Payment of first installment', 'C. Receipt of certificate of good title from search', 'D. Insurance coverage'], ans:'C', exp:'Receipt of certificate of good title from search. (Pg 138)'},
{id:'Q434', q:'What is the purpose of the collateral management plan?', opts:['A. To transfer risk to Legal', 'B. To indicate pre-determined intervals for review of credit collateral', 'C. To increase collateral value', 'D. To approve the loan'], ans:'B', exp:'To indicate pre-determined intervals for review of credit collateral. (Pg 138)'},
{id:'Q435', q:'A collateral management plan is required for each approved facility.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 138)'},
{id:'Q436', q:'What is the purpose of the periodic inspection of collateral security?', opts:['A. To ensure existence and adequacy only', 'B. To confirm existence of security agreement only', 'C. To verify adequate insurance only', 'D. All of the above: to ensure existence and adequacy of the security, confirm existence of security agreement, and verify adequate insurance protection'], ans:'D', exp:'All of the above. (Pg 79)'},
{id:'Q437', q:'Who is responsible for implementation of the collateral management plan?', opts:['A. Credit Risk Management', 'B. Relationship Manager', 'C. Legal Department', 'D. Remedial Assets Unit'], ans:'A', exp:'Credit Risk Management. (Pg 139)'},
{id:'Q438', q:'Delinquency in credit quality and performance can be as a result of a downgrade in credit risk rating.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 139)'},
{id:'Q439', q:'Relationship Management shall maintain a watch list of delinquent facilities for circulation to the CAC on a regular basis.', opts:['A. True', 'B. False'], ans:'B', exp:'False — It is CRM (not Relationship Management) that maintains and circulates the watch list, and it goes to relevant parties on a MONTHLY basis. (Pg 139)'},
{id:'Q440', q:'A formal delinquency notice shall be made to the customer within 7 working days of default.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The correct timeframe is 10 working days, not 7. (Pg 139)'},
{id:'Q441', q:'A second delinquency notice is usually made after 14 working days of the first notice in the event of non-performance.', opts:['A. True', 'B. False'], ans:'B', exp:'False — The correct timeframe is 20 working days after the first notice, not 14. (Pg 139)'},
{id:'Q442', q:'Credit facilities may be classified as remedial accounts after 360 days.', opts:['A. True', 'B. False'], ans:'B', exp:'False — Classification as remedial occurs after 180 days, not 360. (CPG)'},
{id:'Q443', q:'Interest accruals on non-performing exposures may be suspended in accordance with the bank\'s credit loss provision policy.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},
{id:'Q444', q:'Who develops the plan of delinquency management?', opts:['A. Credit Risk Management', 'B. Relationship Manager', 'C. Legal Department', 'D. Remedial Assets Unit'], ans:'A', exp:'Credit Risk Management. (Pg 139)'},
{id:'Q445', q:'The responsibility for delinquency management shall be referred to the Legal Department.', opts:['A. True', 'B. False'], ans:'B', exp:'False — It is the responsibility of the Remedial Assets Unit, not Legal. (Pg 140)'},
{id:'Q446', q:'Where a proposed plan to restructure an existing credit exposure is presented, detailed credit risk analysis of the proposed credit structure may NOT be required.', opts:['A. True', 'B. False'], ans:'A', exp:'True — The CPG indicates that detailed analysis may not always be required for restructuring proposals (context-dependent). (Pg 140)'},
{id:'Q447', q:'A credit facility may be restructured at the request of the obligor as part of ongoing exposure management.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 140)'},
{id:'Q448', q:'As soon as a credit facility is identified as delinquent, adequate loan loss provision ought to be made.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 85)'},
{id:'Q449', q:'Consideration of waivers of interest and/or credit charge shall be limited to credit exposures classified as "very doubtful."', opts:['A. True', 'B. False'], ans:'B', exp:'False — Waivers are ONLY for \'LOST\' classification, not "very doubtful." (Pg 141)'},
{id:'Q450', q:'MOST waivers of interest and charges require approval of the GMD or GDMD.', opts:['A. True', 'B. False'], ans:'B', exp:'False — ALL waivers require GMD approval (not "most"). (Pg 141)'},
{id:'Q451', q:'Under which of the following circumstances will a non-performing exposure be recommended for write-off?', opts:['A. Continued contact is impossible', 'B. Recovery cost exceeds outstanding debt', 'C. Amount realized from collateral leaves a balance', 'D. All of the above'], ans:'D', exp:'All of the above. (Pg 141)'},
{id:'Q452', q:'All write-offs require approval by the Board of Directors and the Central Bank of Nigeria.', opts:['A. True', 'B. False'], ans:'A', exp:'True. (Pg 141)'},
{id:'Q453', q:'In cases of erroneous interest or charges, Credit Risk Management is authorized to approve reversal of such erroneous charges.', opts:['A. True', 'B. False'], ans:'B', exp:'False — Approval for reversal of erroneous charges requires GMD/GDMD, not CRM alone. (Pg 141)'},
{id:'Q454', q:'The authority to approve credit shall be EXCLUSIVELY exercised by the bank\'s Credit Risk Management function.', opts:['A. True', 'B. False'], ans:'B', exp:'False — Credit approval authority is held by designated individuals at various levels; CRM has a sign-off role, not exclusive approval authority. (Pg 63)'},
{id:'Q455', q:'Certain obligors and facilities may be assigned a risk rating in accordance with an approved Risk Rating process.', opts:['A. True', 'B. False'], ans:'A', exp:'True.'},

{id:'Q500', q:'An approved Risk Rating Limit Exception does NOT need to be re-approved during the annual review process.', opts:['A. True', 'B. False'], ans:'B', exp:'False — All RRLEs must be noted and re-reviewed at least annually. (CPG)'}
];

        // Bulletproof LocalStorage
        let missedQuestions = [];
        try {
            const saved = localStorage.getItem('cpg_missed_questions');
            if (saved) missedQuestions = JSON.parse(saved);
        } catch(e) {
            console.warn("localStorage not available or blocked.");
        }

        // Global state
        window.currentTestMode = 'practice';
        window.examTimeLimitSeconds = 3600; // default 60 min
        window.examTimerInterval = null;
        window.examAnswers = [];
        window.examStartTime = null;

        function init() {
            document.getElementById('total-avail').textContent = QB.length;
            document.getElementById('total-missed').textContent = missedQuestions.length;
            
            document.getElementById('mode-select').addEventListener('change', validateStart);
            document.getElementById('count-select').addEventListener('change', validateStart);
            document.getElementById('test-mode-select').addEventListener('change', onTestModeChange);
            document.getElementById('exam-time-input').addEventListener('input', validateStart);
            document.getElementById('start-btn').addEventListener('click', startQuiz);
            document.getElementById('next-btn').addEventListener('click', nextQuestion);
            document.getElementById('skip-btn').addEventListener('click', skipQuestion);
            document.getElementById('end-session-btn').addEventListener('click', endSession);
            document.getElementById('new-session-btn').addEventListener('click', resetApp);
            document.getElementById('retry-missed-btn').addEventListener('click', retryMissed);
            
            // Exam mode buttons
            document.getElementById('prev-exam-btn').addEventListener('click', previousExamQuestion);
            document.getElementById('next-exam-btn').addEventListener('click', nextExamQuestion);
            document.getElementById('submit-exam-btn').addEventListener('click', submitExam);
        }

        function onTestModeChange() {
            const mode = document.getElementById('test-mode-select').value;
            const timeGroup = document.getElementById('exam-time-group');
            if (mode === 'exam') {
                timeGroup.style.display = 'block';
            } else {
                timeGroup.style.display = 'none';
            }
            validateStart();
        }

        function validateStart() {
            const mode = document.getElementById('mode-select').value;
            const count = document.getElementById('count-select').value;
            const testMode = document.getElementById('test-mode-select').value;
            const btn = document.getElementById('start-btn');
            
            if (mode === 'missed' && missedQuestions.length === 0) {
                btn.disabled = true;
                btn.textContent = "No missed questions available";
                return;
            }

            let valid = (mode !== "" && count !== "");
            if (testMode === 'exam') {
                const timeVal = parseInt(document.getElementById('exam-time-input').value);
                if (isNaN(timeVal) || timeVal < 1) valid = false;
            }

            if (valid) {
                btn.disabled = false;
                btn.textContent = "Start Quiz";
            } else {
                btn.disabled = true;
                btn.textContent = "Start Quiz";
            }
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startQuiz() {
            const currentMode = document.getElementById('mode-select').value;
            const countVal = document.getElementById('count-select').value;
            const testMode = document.getElementById('test-mode-select').value;
            window.currentTestMode = testMode;

            let pool;
if (currentMode === 'flashcard') {
    pool = QB.filter(q => q.opts.length === 1 && q.opts[0] === "A. Reveal Answer");
} else {
    pool = currentMode === 'missed' ? QB.filter(q => missedQuestions.includes(q.id)) : [...QB];
    // Exclude flashcards from MCQ modes
    pool = pool.filter(q => !(q.opts.length === 1 && q.opts[0] === "A. Reveal Answer"));
}
            if (currentMode === 'random') pool = shuffleArray(pool);
            
            let currentSessionQuestions = [];
            if (countVal !== 'all') {
                const questionCount = Math.min(parseInt(countVal), pool.length);
                currentSessionQuestions = pool.slice(0, questionCount);
            } else {
                currentSessionQuestions = pool;
            }

            window.currentIndex = 0; 
            window.correctCount = 0; 
            window.wrongCount = 0; 
            window.skippedCount = 0; 
            window.sessionHistory = [];
            window.currentSessionQuestions = currentSessionQuestions;
            window.examAnswers = new Array(currentSessionQuestions.length).fill(-1);
            window.examStartTime = null;
            if (window.examTimerInterval) {
                clearInterval(window.examTimerInterval);
                window.examTimerInterval = null;
            }

            if (currentMode === 'flashcard') {
                showScreen('flashcard-screen');
                renderFlashcard();
            } else if (testMode === 'exam') {
                // Exam mode initialization
                window.examTimeLimitSeconds = parseInt(document.getElementById('exam-time-input').value) * 60;
                window.examStartTime = Date.now();
                startExamTimer();
                showScreen('quiz-screen');
                renderQuestion();
            } else {
                showScreen('quiz-screen');
                renderQuestion();
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function renderQuestion() {
            const q = window.currentSessionQuestions[window.currentIndex];
            document.getElementById('current-q-num').textContent = window.currentIndex + 1;
            document.getElementById('total-q-num').textContent = window.currentSessionQuestions.length;
            document.getElementById('question-text').textContent = q.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            
            const isExam = window.currentTestMode === 'exam';
            
            // Toggle UI elements based on mode
            document.getElementById('quiz-stats-bar').style.display = isExam ? 'none' : 'flex';
            document.getElementById('exam-timer').style.display = isExam ? 'block' : 'none';
            document.getElementById('practice-actions').style.display = isExam ? 'none' : 'flex';
            document.getElementById('exam-actions').style.display = isExam ? 'flex' : 'none';
            document.getElementById('explanation').classList.remove('visible');
            document.getElementById('explanation').textContent = '';
            
            // Update navigation buttons state
            if (isExam) {
                document.getElementById('prev-exam-btn').disabled = (window.currentIndex === 0);
                document.getElementById('next-exam-btn').disabled = (window.currentIndex === window.currentSessionQuestions.length - 1);
            }
            
            // Render options
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                
                if (isExam) {
                    // Highlight previously selected answer
                    if (window.examAnswers[window.currentIndex] === idx) {
                        btn.classList.add('selected');
                    }
                    btn.onclick = () => selectExamAnswer(idx);
                } else {
                    btn.onclick = () => handleAnswer(idx, q);
                }
                optionsList.appendChild(btn);
            });
            
            // In practice mode, reset next button visibility and ensure skip/end are shown
            if (!isExam) {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('skip-btn').style.display = 'block';
                document.getElementById('end-session-btn').style.display = 'block';
            }
            
            updateProgress();
            if (!isExam) updateLiveScore();
        }

        // Practice mode handlers
        function handleAnswer(selectedIdx, q) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            const isCorrect = q.ans === String.fromCharCode(65 + selectedIdx);
            if (isCorrect) {
                buttons[selectedIdx].classList.add('correct');
                window.correctCount++;
                missedQuestions = missedQuestions.filter(id => id !== q.id);
            } else {
                buttons[selectedIdx].classList.add('wrong');
                const correctIdx = q.ans.charCodeAt(0) - 65;
                buttons[correctIdx].classList.add('correct');
                window.wrongCount++;
                if (!missedQuestions.includes(q.id)) missedQuestions.push(q.id);
            }
            try { localStorage.setItem('cpg_missed_questions', JSON.stringify(missedQuestions)); } catch(e) {}
            document.getElementById('total-missed').textContent = missedQuestions.length;
            const expEl = document.getElementById('explanation');
            expEl.textContent = q.exp;
            expEl.classList.add('visible');
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('skip-btn').style.display = 'none';
            window.sessionHistory.push({ q: q, userAnswer: String.fromCharCode(65 + selectedIdx), isCorrect: isCorrect, status: isCorrect ? 'correct' : 'wrong' });
            updateLiveScore();
        }

        function skipQuestion() {
            const q = window.currentSessionQuestions[window.currentIndex];
            window.skippedCount++;
            if (!missedQuestions.includes(q.id)) {
                missedQuestions.push(q.id);
                try { localStorage.setItem('cpg_missed_questions', JSON.stringify(missedQuestions)); } catch(e) {}
                document.getElementById('total-missed').textContent = missedQuestions.length;
            }
            window.sessionHistory.push({ q: q, userAnswer: 'Skipped', isCorrect: false, status: 'skipped' });
            nextQuestion();
        }

        function nextQuestion() {
            window.currentIndex++;
            if (window.currentIndex < window.currentSessionQuestions.length) renderQuestion();
            else showResults();
        }

        // Exam mode handlers
        function selectExamAnswer(idx) {
            window.examAnswers[window.currentIndex] = idx;
            renderQuestion(); // re-render to update highlight
        }

        function previousExamQuestion() {
            if (window.currentIndex > 0) {
                window.currentIndex--;
                renderQuestion();
            }
        }

        function nextExamQuestion() {
            if (window.currentIndex < window.currentSessionQuestions.length - 1) {
                window.currentIndex++;
                renderQuestion();
            }
        }

        function startExamTimer() {
            updateExamTimerDisplay();
            window.examTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - window.examStartTime) / 1000);
                const remaining = window.examTimeLimitSeconds - elapsed;
                if (remaining <= 0) {
                    clearInterval(window.examTimerInterval);
                    window.examTimerInterval = null;
                    // Auto-submit
                    submitExam();
                    return;
                }
                updateExamTimerDisplay(remaining);
            }, 1000);
        }

        function updateExamTimerDisplay(remainingSecs) {
            if (remainingSecs === undefined) {
                remainingSecs = window.examTimeLimitSeconds;
            }
            const mins = Math.floor(remainingSecs / 60);
            const secs = remainingSecs % 60;
            document.getElementById('timer-display').textContent = 
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function submitExam() {
            if (window.examTimerInterval) {
                clearInterval(window.examTimerInterval);
                window.examTimerInterval = null;
            }
            // Build sessionHistory and compute score
            const questions = window.currentSessionQuestions;
            let correct = 0, wrong = 0, skipped = 0;
            window.sessionHistory = [];
            
            questions.forEach((q, index) => {
                const selectedIdx = window.examAnswers[index];
                let userAnswerLetter = 'Not answered';
                let isCorrect = false;
                let status = 'skipped';
                if (selectedIdx !== -1) {
                    userAnswerLetter = String.fromCharCode(65 + selectedIdx);
                    isCorrect = (userAnswerLetter === q.ans);
                    status = isCorrect ? 'correct' : 'wrong';
                }
                if (status === 'correct') correct++;
                else if (status === 'wrong') wrong++;
                else skipped++;
                
                window.sessionHistory.push({
                    q: q,
                    userAnswer: userAnswerLetter,
                    isCorrect: isCorrect,
                    status: status
                });
            });
            
            window.correctCount = correct;
            window.wrongCount = wrong;
            window.skippedCount = skipped;
            
            // Calculate time taken
            const endTime = Date.now();
            const totalSeconds = Math.floor((endTime - window.examStartTime) / 1000);
            const timeTakenStr = formatTime(totalSeconds);
            
            // Update missed questions
            window.sessionHistory.forEach(item => {
                if (item.status === 'wrong' || item.status === 'skipped') {
                    if (!missedQuestions.includes(item.q.id)) {
                        missedQuestions.push(item.q.id);
                    }
                }
            });
            try { localStorage.setItem('cpg_missed_questions', JSON.stringify(missedQuestions)); } catch(e) {}
            
            showResults(true, timeTakenStr);
        }

        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateProgress() {
            const pct = ((window.currentIndex + 1) / window.currentSessionQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function updateLiveScore() {
            const total = window.correctCount + window.wrongCount;
            const score = total === 0 ? 0 : Math.round((window.correctCount / total) * 100);
            document.getElementById('live-correct').textContent = window.correctCount;
            document.getElementById('live-wrong').textContent = window.wrongCount;
            document.getElementById('live-score').textContent = score + '%';
        }

        function renderFlashcard() {
            const q = window.currentSessionQuestions[window.currentIndex];
            document.getElementById('fc-current-num').textContent = window.currentIndex + 1;
            document.getElementById('fc-total-num').textContent = window.currentSessionQuestions.length;
            document.getElementById('fc-question').textContent = q.q;
            document.getElementById('fc-answer').textContent = "Answer: " + q.ans;
            document.getElementById('fc-explanation').textContent = q.exp;
            document.getElementById('flashcard').classList.remove('flipped');
            document.getElementById('fc-actions').style.display = 'none';
            const pct = ((window.currentIndex + 1) / window.currentSessionQuestions.length) * 100;
            document.getElementById('fc-progress-bar').style.width = pct + '%';
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
            setTimeout(() => { document.getElementById('fc-actions').style.display = 'flex'; }, 300);
        }

        function handleFlashcardDecision(gotIt) {
            const q = window.currentSessionQuestions[window.currentIndex];
            if (gotIt) missedQuestions = missedQuestions.filter(id => id !== q.id);
            else if (!missedQuestions.includes(q.id)) missedQuestions.push(q.id);
            try { localStorage.setItem('cpg_missed_questions', JSON.stringify(missedQuestions)); } catch(e) {}
            document.getElementById('total-missed').textContent = missedQuestions.length;
            window.currentIndex++;
            if (window.currentIndex < window.currentSessionQuestions.length) renderFlashcard();
            else showResults();
        }

        function skipFlashcard() {
            const q = window.currentSessionQuestions[window.currentIndex];
            if (!missedQuestions.includes(q.id)) {
                missedQuestions.push(q.id);
                try { localStorage.setItem('cpg_missed_questions', JSON.stringify(missedQuestions)); } catch(e) {}
                document.getElementById('total-missed').textContent = missedQuestions.length;
            }
            window.currentIndex++;
            if (window.currentIndex < window.currentSessionQuestions.length) renderFlashcard();
            else showResults();
        }

        function endSession() { 
            if (window.currentTestMode === 'exam') {
                if (confirm('Are you sure you want to submit your exam?')) submitExam();
            } else {
                showResults();
            }
        }

        function showResults(isExam = false, timeTaken = null) {
            showScreen('results-screen');
            const total = window.correctCount + window.wrongCount + window.skippedCount;
            const score = (window.correctCount + window.wrongCount) === 0 ? 0 : Math.round((window.correctCount / (window.correctCount + window.wrongCount)) * 100);
            const scoreEl = document.getElementById('results-score');
            scoreEl.textContent = score + '%';
            scoreEl.className = 'results-score';
            if (score >= 80) scoreEl.classList.add('green');
            else if (score >= 60) scoreEl.classList.add('amber');
            else scoreEl.classList.add('red');
            
            document.getElementById('res-correct').textContent = window.correctCount;
            document.getElementById('res-wrong').textContent = window.wrongCount;
            document.getElementById('res-skipped').textContent = window.skippedCount;
            document.getElementById('res-total').textContent = total;
            
            // Time taken for exam mode
            const timeBox = document.getElementById('time-stat-box');
            if (isExam && timeTaken) {
                document.getElementById('res-time').textContent = timeTaken;
                timeBox.style.display = 'block';
            } else {
                timeBox.style.display = 'none';
            }
            
            const reviewSection = document.getElementById('review-section');
            reviewSection.innerHTML = '';
            window.sessionHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = `review-item ${item.status}`;
                let correctAnsText = item.q.opts.find(opt => opt.startsWith(item.q.ans + '.')) || item.q.ans;
                div.innerHTML = `<div class="review-q">${item.q.q}</div><div class="review-detail">Your Answer: <strong>${item.userAnswer}</strong></div><div class="review-detail">Correct Answer: <strong>${correctAnsText}</strong></div><div class="review-detail" style="margin-top: 8px; font-style: italic;">${item.q.exp}</div>`;
                reviewSection.appendChild(div);
            });
            if (window.sessionHistory.length === 0) reviewSection.innerHTML = '<div class="review-item"><div class="review-q">No questions were answered in this session.</div></div>';
        }

        function resetApp() {
            // Clear timers
            if (window.examTimerInterval) {
                clearInterval(window.examTimerInterval);
                window.examTimerInterval = null;
            }
            document.getElementById('mode-select').value = ''; 
            document.getElementById('count-select').value = ''; 
            document.getElementById('test-mode-select').value = 'practice';
            document.getElementById('exam-time-group').style.display = 'none';
            const btn = document.getElementById('start-btn');
            btn.disabled = true; 
            btn.textContent = "Start Quiz";
            showScreen('setup-screen'); 
            document.getElementById('total-avail').textContent = QB.length; 
            document.getElementById('total-missed').textContent = missedQuestions.length;
        }

        function retryMissed() {
            document.getElementById('mode-select').value = 'missed'; 
            document.getElementById('count-select').value = 'all'; 
            validateStart(); 
            startQuiz();
        }

        init();
    </script>
</body>
</html>
